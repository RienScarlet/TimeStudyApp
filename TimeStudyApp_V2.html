// Modal-specific wrappers that refresh the modal content after saving

function modalRenameActivity(i) {
  const inp = document.getElementById('modal-act-name');
  const newName = inp ? inp.value.trim() : '';
  if (!newName) { alert('Enter a name.'); return; }
  const study = currentStudy();
  if (!study) return;
  const old = study.activities[i];
  if (newName === old) return;
  if (study.activities.includes(newName)) { alert('That activity name already exists.'); return; }
  // Rename everywhere
  study.activities[i] = newName;
  if (study.manualStd[old])    { study.manualStd[newName]    = study.manualStd[old];    delete study.manualStd[old]; }
  if (study.activityColors[old]) { study.activityColors[newName] = study.activityColors[old]; delete study.activityColors[old]; }
  if (study.activityNotes && study.activityNotes[old]) { study.activityNotes[newName] = study.activityNotes[old]; delete study.activityNotes[old]; }
  study.entries.forEach(e => { if (e.activity === old) e.activity = newName; });
  study.activityGroups.forEach(g => {
    const idx = g.activities.indexOf(old);
    if (idx !== -1) g.activities[idx] = newName;
  });
  saveDb();
  closeModal('act-settings-modal');
  renderManage();
  showNotice(`Renamed to "${newName}".`);
}

function modalSetColor(i, color) {
  const study = currentStudy();
  if (!study) return;
  const act = study.activities[i];
  if (!act) return;
  if (!study.activityColors) study.activityColors = {};
  if (color) study.activityColors[act] = color;
  else delete study.activityColors[act];
  saveDb();
  // Refresh modal and manage list without closing
  openActivitySettings(i);
  renderManage();
}

function modalSaveNote(i) {
  const ta = document.getElementById('modal-act-note');
  if (!ta) return;
  const study = currentStudy();
  if (!study) return;
  const act = study.activities[i];
  if (!study.activityNotes) study.activityNotes = {};
  const val = ta.value.trim();
  if (val) study.activityNotes[act] = val;
  else delete study.activityNotes[act];
  saveDb();
  showNotice('Note saved.');
  renderManage();
}

function modalSetStd(i, actName) {
  const inp = document.getElementById('modal-std');
  if (!inp || !inp.value) return;
  const [h, m, s] = inp.value.split(':').map(Number);
  const secs = (h || 0) * 3600 + (m || 0) * 60 + (s || 0);
  const study = currentStudy();
  if (!study || secs <= 0) return;
  study.manualStd[actName] = secs;
  saveDb();
  openActivitySettings(i); // refresh modal to show new std
  renderManage();
  showNotice(`Standard time set: ${secsToStr(secs)}`);
}

function modalUseAvg(i, actName, avg) {
  const study = currentStudy();
  if (!study) return;
  study.manualStd[actName] = avg;
  saveDb();
  openActivitySettings(i);
  renderManage();
  showNotice(`Standard time set to average: ${secsToStr(avg)}`);
}

function modalDeleteActivity(i) {
  const study = currentStudy();
  if (!study) return;
  const act = study.activities[i];
  if (!confirm(`Delete activity "${act}"?\n\nThis removes it from the activity list. Existing log entries keep the activity name.`)) return;
  study.activities.splice(i, 1);
  delete study.manualStd[act];
  if (study.activityColors) delete study.activityColors[act];
  if (study.activityNotes)  delete study.activityNotes[act];
  study.activityGroups.forEach(g => { g.activities = g.activities.filter(a => a !== act); });
  saveDb();
  closeModal('act-settings-modal');
  renderManage();
}

function saveActivityNote(i, activityName) {
  const ta = document.getElementById(`act-note-${i}`);
  if (!ta) return;
  const study = currentStudy();
  if (!study) return;
  if (!study.activityNotes) study.activityNotes = {};
  const val = ta.value.trim();
  if (val) study.activityNotes[activityName] = val;
  else delete study.activityNotes[activityName];
  saveDb();
}

function manageAddActivity() {
  const inp = document.getElementById('manage-new-act');
  const act = inp ? inp.value.trim() : '';
  if (!act) return;
  const study = currentStudy();
  if (!study) return;
  if (!study.activities.includes(act)) { study.activities.push(act); saveDb(); }
  renderManage();
}

function manageRenameActivity(i) {
  const inp = document.getElementById(`act-name-${i}`);
  const study = currentStudy();
  if (!study || !inp) return;
  const oldName = study.activities[i];
  const newName = inp.value.trim();
  if (!newName || newName === oldName) return;
  // Update all entries
  study.entries.forEach(e => { if (e.activity === oldName) e.activity = newName; });
  if (study.manualStd[oldName] !== undefined) {
    study.manualStd[newName] = study.manualStd[oldName];
    delete study.manualStd[oldName];
  }
  study.activities[i] = newName;
  saveDb();
  renderManage();
}

function manageDeleteActivity(i) {
  const study = currentStudy();
  if (!study) return;
  const act = study.activities[i];
  if (!confirm(`Delete activity "${act}" and all its entries?`)) return;
  // Move entries to recycle bin
  study.entries.filter(e => e.activity === act).forEach(e => {
    e.deletedAt = Date.now();
    e._studyId = study.id;
    e._profileId = db.activeProfileId;
    db.recyclebin.push(e);
  });
  study.entries = study.entries.filter(e => e.activity !== act);
  study.activities.splice(i, 1);
  delete study.manualStd[act];
  saveDb();
  renderManage();
}

function manageSetStd(i, act) {
  const inp = document.getElementById(`std-${i}`);
  const study = currentStudy();
  if (!study || !inp) return;
  const val = inp.value;
  const secs = hmsToSecs(val);
  study.manualStd[act] = secs;
  saveDb();
  renderManage();
}

function manageUseAvg(i, act, avg) {
  const study = currentStudy();
  if (!study) return;
  study.manualStd[act] = avg;
  saveDb();
  renderManage();
}

// ===== STUDIES TAB =====
function renderStudies() {
  const p = currentProfile();
  if (!p) { document.getElementById('content').innerHTML = '<div class="empty-state">No profile.</div>'; return; }
  const studies = p.studies || [];

  let html = `
  <div class="card">
    <div class="card-title">New Study</div>
    <div class="form-row">
      <div class="form-group"><label>Name</label><input id="new-study-name" type="text" placeholder="Study name"></div>
      <div class="form-group" style="flex:0 0 130px"><label>Date</label><input id="new-study-date" type="date" value="${todayStr()}"></div>
    </div>
    <button class="btn btn-primary btn-sm mt8" onclick="addStudy()">+ Create</button>
  </div>`;

  studies.forEach(s => {
    const isActive = s.id === p.activeStudyId;
    const entryCount = s.entries.filter(e => !e.deletedAt).length;
    html += `
    <div class="study-item ${isActive ? 'active' : ''}" onclick="switchStudy('${s.id}')">
      <div class="study-item-info">
        <div class="study-item-name">${esc(s.name)} ${isActive ? '✓' : ''}</div>
        <div class="study-item-meta">${s.date} · ${entryCount} entries</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-xs" onclick="duplicateStudy('${s.id}')">⧉ Dup</button>
        <button class="btn btn-red btn-xs" onclick="deleteStudy('${s.id}')">🗑</button>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function addStudy() {
  const name = document.getElementById('new-study-name').value.trim();
  const date = document.getElementById('new-study-date').value || todayStr();
  if (!name) { alert('Enter a study name.'); return; }
  const p = currentProfile();
  if (!p) return;
  const id = generateId();
  p.studies.push({ id, name, date, activities: [], entries: [], manualStd: {}, quickAddPinned: null, activityGroups: [], quickStartPinned: null, activityColors: {}, activityNotes: {} });
  p.activeStudyId = id;
  saveDb();
  renderStudies();
  updateTopBar();
}

function switchStudy(id) {
  const p = currentProfile();
  if (!p) return;
  p.activeStudyId = id;
  saveDb();
  renderStudies();
  updateTopBar();
}

function deleteStudy(id) {
  const p = currentProfile();
  if (!p) return;
  const study = p.studies.find(s => s.id === id);
  if (!study) return;
  if (!confirm(`Delete study "${study.name}"?`)) return;
  study.entries.forEach(e => {
    e.deletedAt = Date.now();
    e._studyId = id;
    e._profileId = db.activeProfileId;
    db.recyclebin.push(e);
  });
  p.studies = p.studies.filter(s => s.id !== id);
  if (p.activeStudyId === id) p.activeStudyId = p.studies[0] && p.studies[0].id;
  saveDb();
  renderStudies();
  updateTopBar();
}

function duplicateStudy(id) {
  const p = currentProfile();
  if (!p) return;
  const src = p.studies.find(s => s.id === id);
  if (!src) return;
  const newId = generateId();
  p.studies.push({
    id: newId,
    name: src.name + ' (copy)',
    date: todayStr(),
    activities: [...src.activities],
    entries: [],
    manualStd: { ...src.manualStd },
    quickAddPinned: src.quickAddPinned ? [...src.quickAddPinned] : null,
    activityGroups: src.activityGroups ? src.activityGroups.map(g => ({...g, activities: [...g.activities]})) : [],
    quickStartPinned: src.quickStartPinned ? [...src.quickStartPinned] : null,
    activityColors: src.activityColors ? {...src.activityColors} : {},
    activityNotes:  src.activityNotes  ? {...src.activityNotes}  : {}
  });
  saveDb();
  renderStudies();
}

function createProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) { alert('Enter profile name.'); return; }
  const studyId = generateId();
  const id = generateId();
  db.profiles.push({
    id, name,
    createdAt: new Date().toISOString(),
    studies: [{ id: studyId, name: 'Study 1', date: todayStr(), activities: [], entries: [], manualStd: {} }],
    activeStudyId: studyId,
    notes: ''
  });
  db.activeProfileId = id;
  saveDb();
  renderSettings();
  updateTopBar();
}

function switchProfile(id) {
  db.activeProfileId = id;
  saveDb();
  render();
}

function renameProfile(id) {
  const p = db.profiles.find(p => p.id === id);
  if (!p) return;
  const name = prompt('New profile name:', p.name);
  if (name && name.trim()) { p.name = name.trim(); saveDb(); renderSettings(); updateTopBar(); }
}

function deleteProfile(id) {
  const p = db.profiles.find(p => p.id === id);
  if (!p) return;
  if (!confirm(`Delete profile "${p.name}" and all its data?`)) return;
  db.profiles = db.profiles.filter(p => p.id !== id);
  db.recyclebin = db.recyclebin.filter(e => e._profileId !== id);
  if (db.activeProfileId === id) db.activeProfileId = db.profiles[0] && db.profiles[0].id;
  saveDb();
  renderSettings();
  updateTopBar();
}

// ===== RECYCLE BIN MODAL =====
function openBinModal() {
  renderBinModal();
  openModal('bin-modal');
}

function renderBinModal() {
  const el = document.getElementById('bin-modal-list');
  if (!el) return;
  if (db.recyclebin.length === 0) {
    el.innerHTML = '<div class="empty-state">Recycle bin is empty.</div>';
    return;
  }
  el.innerHTML = `<button class="btn btn-red btn-sm btn-full mb8" onclick="binClearAll()">🗑 Permanently Delete All</button>` +
    db.recyclebin.slice().reverse().map(e => `
  <div class="bin-entry">
    <div class="bin-entry-info">
      <div class="bin-entry-name">${esc(e.activity)}</div>
      <div class="bin-entry-meta">${e.date} · ${secsToStr(e.duration)} · deleted ${new Date(e.deletedAt).toLocaleDateString()}</div>
      ${e.note ? `<div style="font-size:11px;color:var(--text3)">${esc(e.note)}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
      <button class="btn btn-green btn-xs" onclick="binRestore(${e.id})">Restore</button>
      <button class="btn btn-red btn-xs" onclick="binDelete(${e.id})">Delete</button>
    </div>
  </div>`).join('');
}

function binRestore(id) {
  const idx = db.recyclebin.findIndex(e => e.id === id);
  if (idx === -1) return;
  const entry = db.recyclebin.splice(idx, 1)[0];
  // Find the study it came from
  const profileId = entry._profileId || db.activeProfileId;
  const studyId = entry._studyId;
  const profile = db.profiles.find(p => p.id === profileId) || currentProfile();
  if (!profile) { alert('Cannot find original profile.'); return; }
  const study = profile.studies.find(s => s.id === studyId) || profile.studies[0];
  if (!study) { alert('Cannot find original study.'); return; }
  entry.deletedAt = null;
  study.entries.push(entry);
  saveDb();
  renderBinModal();
  _refreshBinFab();
}

function binDelete(id) {
  if (!confirm('Permanently delete this entry?')) return;
  db.recyclebin = db.recyclebin.filter(e => e.id !== id);
  saveDb();
  renderBinModal();
  _refreshBinFab();
}

function binClearAll() {
  if (!confirm('Permanently delete ALL entries in the bin?')) return;
  db.recyclebin = [];
  saveDb();
  renderBinModal();
  _refreshBinFab();
}

function _refreshBinFab() {
  const wrap = document.getElementById('bin-fab-wrap');
  if (!wrap) return;
  const binCount = db.recyclebin.length;
  wrap.querySelector('.bin-fab').title = `Recycle Bin (${binCount} item${binCount !== 1 ? 's' : ''})`;
  const existing = wrap.querySelector('.bin-fab-badge');
  if (existing) existing.remove();
  if (binCount > 0) {
    const badge = document.createElement('div');
    badge.className = 'bin-fab-badge';
    badge.textContent = binCount > 99 ? '99+' : binCount;
    wrap.appendChild(badge);
  }
}

function exportCsv() {
  const study = currentStudy();
  if (!study) { alert('No active study.'); return; }
  const mode = db.settings.hourMode;
  const rows = [['Date','Group','Activity','Start','End','Duration','Secs','Exception','Note']];
  study.entries.filter(e => !e.deletedAt).forEach(e => {
    const grp = getActivityGroup(study, e.activity);
    rows.push([
      e.date,
      grp ? grp.name : '',
      e.activity,
      displayTime(e, 'start', mode),
      displayTime(e, 'end', mode),
      secsToStr(e.duration),
      e.duration,
      e.exception ? 'Yes' : 'No',
      e.note || ''
    ]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  downloadBlob(csv, `${study.name}_${todayStr()}.csv`, 'text/csv;charset=utf-8');
}

function exportXlsx() {
  if (window._xlsxUnavailable || typeof XLSX === 'undefined') {
    alert('XLSX export is unavailable offline until the library has been cached.\n\nPlease open the app once while connected to the internet, then try again.\n\nIn the meantime, use CSV Export — it works fully offline.');
    return;
  }
  try {
    const study = currentStudy();
    if (!study) { alert('No active study.'); return; }
    const mode    = db.settings.hourMode;
    const entries = study.entries.filter(e => !e.deletedAt);
    const wb      = XLSX.utils.book_new();

    // ── Sheet 1: Raw Data ──────────────────────────────────────────────────
    const dataRows = [['Date','Group','Activity','Start','End','Duration (HH:MM:SS)','Duration (Mins)','Exception','Note']];
    entries.forEach(e => {
      const grp  = getActivityGroup(study, e.activity);
      const mins = parseFloat((e.duration / 60).toFixed(2));
      dataRows.push([
        e.date,
        grp ? grp.name : '',
        e.activity,
        displayTime(e, 'start', mode),
        displayTime(e, 'end', mode),
        secsToStr(e.duration),
        mins,
        e.exception ? 'Yes' : 'No',
        e.note || ''
      ]);
    });
    const wsData = XLSX.utils.aoa_to_sheet(dataRows);
    // Column widths
    wsData['!cols'] = [
      {wch:12},{wch:16},{wch:20},{wch:10},{wch:10},
      {wch:18},{wch:14},{wch:10},{wch:30}
    ];
    XLSX.utils.book_append_sheet(wb, wsData, 'Data');

    // ── Sheet 2: Summary by Activity ──────────────────────────────────────
    const actMap = {};
    entries.forEach(e => {
      if (!actMap[e.activity]) actMap[e.activity] = [];
      actMap[e.activity].push(e);
    });
    const summaryRows = [['Group','Activity','Count','Total Time','Total (Mins)','Average','Avg (Mins)','Shortest','Longest','Exceptions','Std Time']];
    Object.keys(actMap).forEach(act => {
      const items    = actMap[act];
      const count    = items.length;
      const total    = items.reduce((s, e) => s + (e.duration || 0), 0);
      const avg      = Math.round(total / count);
      const shortest = Math.min(...items.map(e => e.duration || 0));
      const longest  = Math.max(...items.map(e => e.duration || 0));
      const excepts  = items.filter(e => e.exception).length;
      const std      = study.manualStd[act] || 0;
      const grp      = getActivityGroup(study, act);
      summaryRows.push([
        grp ? grp.name : 'Ungrouped',
        act,
        count,
        secsToStr(total),
        parseFloat((total / 60).toFixed(2)),
        secsToStr(avg),
        parseFloat((avg / 60).toFixed(2)),
        secsToStr(shortest),
        secsToStr(longest),
        excepts,
        std ? secsToStr(std) : ''
      ]);
    });
    const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
    wsSummary['!cols'] = [
      {wch:16},{wch:20},{wch:8},{wch:14},{wch:12},
      {wch:12},{wch:10},{wch:12},{wch:12},{wch:10},{wch:12}
    ];
    XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

    // ── Sheet 3: Group Summary (if groups exist) ───────────────────────────
    const groups = study.activityGroups || [];
    if (groups.length > 0) {
      const grpRows = [['Group','Activities','Total Entries','Total Time','Total (Mins)','Average (Mins)']];
      const ungroupedEntries = entries.filter(e => !getActivityGroup(study, e.activity));

      groups.forEach(g => {
        const gEntries = entries.filter(e => g.activities.includes(e.activity));
        const total    = gEntries.reduce((s, e) => s + (e.duration || 0), 0);
        const avg      = gEntries.length ? total / gEntries.length : 0;
        grpRows.push([
          g.name,
          g.activities.join(', '),
          gEntries.length,
          secsToStr(total),
          parseFloat((total / 60).toFixed(2)),
          parseFloat((avg / 60).toFixed(2))
        ]);
      });
      if (ungroupedEntries.length > 0) {
        const total = ungroupedEntries.reduce((s, e) => s + (e.duration || 0), 0);
        const avg   = total / ungroupedEntries.length;
        grpRows.push(['Ungrouped', '—', ungroupedEntries.length, secsToStr(total),
          parseFloat((total / 60).toFixed(2)), parseFloat((avg / 60).toFixed(2))]);
      }
      const wsGroups = XLSX.utils.aoa_to_sheet(grpRows);
      wsGroups['!cols'] = [{wch:16},{wch:30},{wch:14},{wch:14},{wch:12},{wch:14}];
      XLSX.utils.book_append_sheet(wb, wsGroups, 'Groups');
    }

    // ── Sheet 4: Chart Data + embedded chart ──────────────────────────────
    // Build a clean activity vs total-minutes table that Excel can chart
    const chartActivities = Object.keys(actMap);
    const chartRows = [['Activity', 'Total (Mins)', 'Average (Mins)', 'Count']];
    chartActivities.forEach(act => {
      const items = actMap[act];
      const total = items.reduce((s, e) => s + (e.duration || 0), 0);
      const avg   = total / items.length;
      chartRows.push([act, parseFloat((total/60).toFixed(2)), parseFloat((avg/60).toFixed(2)), items.length]);
    });
    const wsChart = XLSX.utils.aoa_to_sheet(chartRows);
    wsChart['!cols'] = [{wch:22},{wch:14},{wch:14},{wch:8}];

    // Embed a clustered bar chart using SheetJS chart spec
    const numActs = chartActivities.length;
    wsChart['!charts'] = [{
      name: 'Activity Summary',
      type: 'bar',
      title: `${study.name} — Time by Activity (Minutes)`,
      series: [
        {
          name: { sheet: 'Chart', row: 0, col: 1 },
          xValues: { sheet: 'Chart', row: 1, col: 0, rowCount: numActs },
          yValues: { sheet: 'Chart', row: 1, col: 1, rowCount: numActs }
        },
        {
          name: { sheet: 'Chart', row: 0, col: 2 },
          xValues: { sheet: 'Chart', row: 1, col: 0, rowCount: numActs },
          yValues: { sheet: 'Chart', row: 1, col: 2, rowCount: numActs }
        }
      ],
      plot_area: { col: 0, row: numActs + 3, col2: 10, row2: numActs + 22 }
    }];

    XLSX.utils.book_append_sheet(wb, wsChart, 'Chart');

    XLSX.writeFile(wb, `${study.name}_${todayStr()}.xlsx`);
    showNotice('XLSX exported — 4 sheets including Summary & Groups.');
  } catch(err) {
    console.error('XLSX export error:', err);
    alert('XLSX export failed. Try CSV instead.');
  }
}

// ===== PRESET EXPORT / IMPORT =====
// A preset is a stripped study snapshot: activities, groups, colours,
// standard times, and descriptions — no entries, no timestamps.
function exportPreset() {
  const study = currentStudy();
  if (!study) { alert('No active study.'); return; }

  const preset = {
    _type: 'timestudy-preset-v1',
    name: study.name,
    exportedAt: new Date().toISOString(),
    activities:     [...(study.activities || [])],
    manualStd:      {...(study.manualStd  || {})},
    activityGroups: (study.activityGroups || []).map(g => ({
      name: g.name,
      color: g.color,
      activities: [...g.activities]
    })),
    activityColors: {...(study.activityColors || {})},
    activityNotes:  {...(study.activityNotes  || {})}
  };

  const blob = new Blob([JSON.stringify(preset, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${study.name.replace(/\s+/g, '_')}_preset_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showNotice('Preset exported.');
}

function importPreset(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const preset = JSON.parse(ev.target.result);

      // Validate
      if (!preset._type || !preset._type.startsWith('timestudy-preset')) {
        alert('This file is not a valid Time Study preset.\n\nMake sure you are importing a preset file exported from this app, not a full backup.');
        return;
      }

      const study = currentStudy();
      if (!study) { alert('No active study.'); return; }

      const actCount   = (preset.activities || []).length;
      const grpCount   = (preset.activityGroups || []).length;
      const presetName = preset.name || 'Unknown';

      const msg = `Import preset "${presetName}"?\n\n` +
        `• ${actCount} activities\n` +
        `• ${grpCount} groups\n\n` +
        `Choose how to apply it:\n\n` +
        `OK = Merge with existing (keeps your current activities)\n` +
        `Cancel = Do nothing`;

      if (!confirm(msg)) { input.value = ''; return; }

      // Merge activities — add any that don't already exist
      if (!study.activities) study.activities = [];
      (preset.activities || []).forEach(a => {
        if (!study.activities.includes(a)) study.activities.push(a);
      });

      // Merge standard times — preset wins for any activity it defines
      if (!study.manualStd) study.manualStd = {};
      Object.assign(study.manualStd, preset.manualStd || {});

      // Merge activity colours — preset wins
      if (!study.activityColors) study.activityColors = {};
      Object.assign(study.activityColors, preset.activityColors || {});

      // Merge activity notes — preset wins
      if (!study.activityNotes) study.activityNotes = {};
      Object.assign(study.activityNotes, preset.activityNotes || {});

      // Merge groups — add groups that don't already exist by name
      if (!study.activityGroups) study.activityGroups = [];
      (preset.activityGroups || []).forEach(pg => {
        const existing = study.activityGroups.find(g => g.name === pg.name);
        if (existing) {
          // Add any new activities to the existing group
          pg.activities.forEach(a => {
            if (!existing.activities.includes(a)) existing.activities.push(a);
          });
          existing.color = pg.color; // update colour
        } else {
          study.activityGroups.push({
            id: generateId(),
            name: pg.name,
            color: pg.color,
            activities: [...pg.activities]
          });
        }
      });

      saveDb();
      render();
      showNotice(`Preset "${presetName}" imported — ${actCount} activities, ${grpCount} groups.`);
    } catch(e) {
      alert('Failed to parse preset file. Make sure it is a valid JSON preset.');
      console.error(e);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportJson() {
  const json = JSON.stringify(db, null, 2);
  downloadBlob(json, `TimeStudy_backup_${todayStr()}.json`, 'application/json');
}

function importJson(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.profiles || !imported.settings) throw new Error('Invalid backup');
      if (!confirm('Replace ALL current data with this backup?')) return;
      db = imported;
      saveDb();
      render();
      showNotice('Data imported successfully!');
    } catch(ex) {
      alert('Invalid backup file: ' + ex.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ===== NOTICE =====
let noticeTimeout = null;
function showNotice(msg, type) {
  const existing = document.getElementById('_notice');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = '_notice';
  div.className = 'notice ' + (type === 'amber' ? 'notice-amber' : '');
  div.textContent = msg;
  // On mobile: notice sits below top-bar + tab-bar (both sticky).
  // On desktop: tab-bar becomes a vertical sidebar, so only top-bar height applies.
  // Use CSS variables so the offset automatically matches every breakpoint.
  const offset = isDesktop()
    ? 'calc(var(--top-h) + 12px)'
    : 'calc(var(--top-h) + var(--tab-h) + 8px)';
  div.style.cssText = `position:fixed;top:${offset};left:50%;transform:translateX(-50%);z-index:999;max-width:420px;width:90%;box-shadow:0 4px 16px rgba(0,0,0,0.18);`;
  document.body.appendChild(div);
  clearTimeout(noticeTimeout);
  noticeTimeout = setTimeout(() => div.remove(), 3000);
}

// ===== ESCAPE HELPER =====
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== RESPONSIVE HELPERS =====
function isDesktop() { return window.innerWidth >= 900; }

// Re-render on resize so layouts (e.g. stat-grid columns) update.
// On Android, opening the soft keyboard fires a resize event (viewport height
// shrinks). Guard: only re-render on genuine width changes so the keyboard
// never steals focus and dismisses itself.
let resizeDebounce = null;
let _lastInnerWidth = window.innerWidth;
window.addEventListener('resize', () => {
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(() => {
    const widthChanged = window.innerWidth !== _lastInnerWidth;
    _lastInnerWidth = window.innerWidth;
    if (!widthChanged) return;
    const focused = document.activeElement;
    const inputFocused = focused && (
      focused.tagName === 'INPUT' ||
      focused.tagName === 'TEXTAREA' ||
      focused.tagName === 'SELECT'
    );
    if (inputFocused) return;
    render();
  }, 200);
});

// ===== SERVICE WORKER =====
const _swEligible = (() => {
  const { protocol, hostname } = location;
  if (protocol === 'file:') return false;
  if (hostname === 'localhost' || hostname === '127.0.0.1') return false;
  if (hostname.endsWith('claudeusercontent.com')) return false;
  return true;
})();

if ('serviceWorker' in navigator && _swEligible) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        console.log('[PWA] Service worker registered:', reg.scope);

        // Listen for a new SW waiting to activate
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(reg);
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));

    // If a new SW just took control, reload cleanly
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; location.reload(); }
    });
  });
}

function showUpdateBanner(reg) {
  const existing = document.getElementById('_update-banner');
  if (existing) return;
  const div = document.createElement('div');
  div.id = '_update-banner';
  div.style.cssText = `
    position:fixed; bottom:0; left:0; right:0; z-index:9999;
    background:#1a1916; color:#f5f4f0;
    padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between; gap:12px;
    font-family:Georgia,serif; font-size:13px;
    box-shadow:0 -2px 12px rgba(0,0,0,0.3);
  `;
  div.innerHTML = `
    <span>🔄 A new version is available.</span>
    <div style="display:flex;gap:8px">
      <button onclick="document.getElementById('_update-banner').remove()"
        style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:#f5f4f0;
               padding:5px 12px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;">
        Later
      </button>
      <button onclick="swUpdate()"
        style="background:#1a6b3a;border:none;color:#fff;
               padding:5px 12px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;">
        Update
      </button>
    </div>`;
  document.body.appendChild(div);
  window._swReg = reg;
}

function swUpdate() {
  const banner = document.getElementById('_update-banner');
  if (banner) banner.remove();
  if (window._swReg && window._swReg.waiting) {
    window._swReg.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
}

// ===== ONLINE / OFFLINE INDICATOR =====
function updateOnlineStatus() {
  const existing = document.getElementById('_offline-bar');
  if (navigator.onLine) {
    if (existing) {
      // Fade out smoothly before removing
      existing.style.opacity = '0';
      setTimeout(() => existing.remove(), 400);
    }
  } else {
    if (existing) return;
    const bar = document.createElement('div');
    bar.id = '_offline-bar';
    bar.style.cssText = `
      position:fixed; bottom:18px; right:12px; z-index:10000;
      background:rgba(15,14,12,0.85); color:rgba(240,239,233,0.7);
      padding:4px 10px; font-size:10px; font-family:'DM Mono',monospace;
      border-radius:2px; border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      display:flex; align-items:center; gap:6px; pointer-events:none;
      transition:opacity 0.4s; letter-spacing:0.06em; text-transform:uppercase;
    `;
    bar.innerHTML = '<span style="font-size:7px;opacity:0.6;">■</span> OFFLINE';
    document.body.appendChild(bar);
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

</script>
</body>
