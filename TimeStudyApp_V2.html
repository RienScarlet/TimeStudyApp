<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1916">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeStudy">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96.png">

<!-- SEO / Share -->
<meta name="description" content="Time Study V2 — live timers, manual entry, charts &amp; multi-study management.">
<meta name="application-name" content="Time Study V2">
<title>Time Study V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
        onerror="window._xlsxUnavailable=true;console.warn('[TimeStudy] XLSX library unavailable offline — open once while online to cache it.');"></script>
<style>
  :root {
    --bg:       #f0efe9;
    --surface:  #fafaf7;
    --surface2: #eceae2;
    --border:   #d8d5cb;
    --text:     #0f0e0c;
    --text2:    #5c5a54;
    --text3:    #a8a59c;
    --green:    #00875a;
    --amber:    #b45309;
    --blue:     #1d4ed8;
    --red:      #b91c1c;
    --green-bg: #d1fae5;
    --amber-bg: #fef3c7;
    --blue-bg:  #dbeafe;
    --red-bg:   #fee2e2;
    --accent:   #1d4ed8;
    --accent2:  #00875a;
    --radius:   4px;
    --font:     'DM Sans', system-ui, sans-serif;
    --display:  'Barlow Condensed', sans-serif;
    --mono:     'DM Mono', 'Courier New', monospace;
    --base-font: 14px;
    --sm-font:   12px;
    --xs-font:   11px;
    --lg-font:   16px;
    --pad:       16px;
    --pad-sm:    10px;
    --card-pad:  16px;
    --top-h:     58px;
    --tab-h:     40px;
  }

  /* ── Dark theme — applied when <html data-theme="dark"> ── */
  [data-theme="dark"] {
    --bg:       #0c0c0b;
    --surface:  #141413;
    --surface2: #1e1e1c;
    --border:   #2a2a27;
    --text:     #f0efe9;
    --text2:    #8a8880;
    --text3:    #4a4845;
    --green:    #10b981;
    --amber:    #f59e0b;
    --blue:     #60a5fa;
    --red:      #f87171;
    --green-bg: #052e16;
    --amber-bg: #1c1400;
    --blue-bg:  #0c1a3a;
    --red-bg:   #1c0505;
    --accent:   #60a5fa;
    --accent2:  #10b981;
  }

  @media (min-width: 768px) {
    [data-theme="dark"] body { background: #070706; }
  }

  /* ── Tablet ── */
  @media (min-width: 600px) {
    :root {
      --base-font: 14px;
      --sm-font: 12px;
      --xs-font: 11px;
      --lg-font: 17px;
      --pad: 20px;
      --pad-sm: 12px;
      --card-pad: 18px;
      --top-h: 64px;
      --tab-h: 44px;
    }
  }

  /* ── Desktop ── */
  @media (min-width: 1024px) {
    :root {
      --base-font: 15px;
      --sm-font: 13px;
      --xs-font: 12px;
      --lg-font: 18px;
      --pad: 28px;
      --pad-sm: 16px;
      --card-pad: 22px;
      --top-h: 68px;
      --tab-h: 48px;
    }
  }

  /* ── Wide desktop ── */
  @media (min-width: 1440px) {
    :root {
      --base-font: 15px;
      --sm-font: 13px;
      --lg-font: 19px;
      --pad: 32px;
      --card-pad: 24px;
      --top-h: 70px;
      --tab-h: 50px;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    font-family: var(--font);
    font-size: var(--base-font);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  @media (min-width: 768px) {
    body { background: #dddbd2; }
  }
  [data-theme="dark"] body { background: var(--bg); }
  @media (min-width: 768px) {
    [data-theme="dark"] body { background: #070706; }
  }

  #app {
    width: 100%;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
  }
  @media (min-width: 600px) {
    #app { max-width: 600px; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.15); }
  }
  @media (min-width: 900px) {
    #app { max-width: 820px; border-radius: 0; }
  }
  @media (min-width: 1200px) { #app { max-width: 1100px; } }
  @media (min-width: 1600px) { #app { max-width: 1300px; } }

  /* TOP BAR */
  #top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 var(--pad);
    min-height: var(--top-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  #top-bar-title {
    font-family: var(--display);
    font-size: clamp(20px, 4vw, 26px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex: 1;
    min-width: 0;
    line-height: 1;
  }
  #top-bar-sub {
    font-size: var(--xs-font);
    color: var(--text3);
    font-family: var(--mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
    letter-spacing: 0.02em;
    margin-top: 3px;
  }
  #profile-chip {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 12px;
    font-size: var(--xs-font);
    font-family: var(--mono);
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  #profile-chip:hover { background: var(--surface2); color: var(--text); border-color: var(--text3); }

  /* TAB BAR */
  #tab-bar {
    position: sticky;
    top: var(--top-h);
    z-index: 99;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 0 var(--pad-sm);
    height: var(--tab-h);
    font-size: 11px;
    font-family: var(--font);
    font-weight: 600;
    color: var(--text3);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.12s, border-color 0.12s;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }

  /* CONTENT */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: var(--pad);
    padding-bottom: 80px;
  }
  #content-inner { width: 100%; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--card-pad);
    margin-bottom: 10px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 9px 18px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: var(--sm-font);
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: opacity 0.12s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); opacity: 0.7; }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-green  { background: var(--green); color: #fff; }
  .btn-amber  { background: var(--amber); color: #fff; }
  .btn-red    { background: var(--red);   color: #fff; }
  .btn-blue   { background: var(--blue);  color: #fff; }
  .btn-ghost  {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-sm  { padding: 6px 12px; font-size: var(--xs-font); }
  .btn-xs  { padding: 3px 8px;  font-size: 10px; border-radius: 3px; }
  .btn-full { width: 100%; display: flex; }

  /* FORM ELEMENTS */
  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 11px;
    font-family: var(--font);
    font-size: var(--base-font);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    appearance: auto;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
  }
  label { font-size: var(--xs-font); font-weight: 600; color: var(--text3); display: block; margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  /* Labels styled as buttons must not inherit the uppercase transform */
  label.btn { text-transform: none; letter-spacing: 0.02em; font-size: var(--sm-font); color: var(--text2); }
  .form-group { margin-bottom: 10px; }
  .form-row { display: flex; gap: 8px; align-items: flex-end; }
  .form-row .form-group { flex: 1; margin-bottom: 0; }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-blue  { background: var(--blue-bg);  color: var(--blue);  }
  .badge-red   { background: var(--red-bg);   color: var(--red);   }

  /* TIMER DISPLAY */
  .timer-display {
    font-family: var(--display);
    font-size: clamp(32px, 8vw, 48px);
    font-weight: 700;
    color: var(--green);
    letter-spacing: 2px;
    line-height: 1;
  }
  .timer-display.paused { color: var(--amber); }

  /* SESSION CARD */
  .session-card {
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: var(--radius);
    padding: var(--card-pad);
    margin-bottom: 10px;
    background: var(--surface);
    transition: border-color 0.2s;
  }
  .session-card.paused { border-left-color: var(--amber); }
  .session-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .session-activity {
    font-family: var(--display);
    font-size: clamp(18px, 4vw, 22px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .session-start { font-size: var(--xs-font); color: var(--text3); font-family: var(--mono); }
  .session-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .session-meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .session-note { margin-top: 8px; }
  .session-note textarea { min-height: 50px; font-size: var(--sm-font); }

  /* LOG ENTRIES */
  .date-heading {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 8px 0 5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .entry-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    transition: border-color 0.12s;
  }
  .entry-row:hover { border-left-color: var(--accent); }
  .entry-info { flex: 1; min-width: 0; }
  .entry-activity {
    font-size: var(--base-font);
    font-weight: 600;
  }
  .entry-times { font-size: var(--xs-font); color: var(--text3); font-family: var(--mono); margin-top: 2px; letter-spacing: 0.02em; }
  .entry-note-preview { font-size: var(--xs-font); color: var(--text3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
  .entry-badges { display: flex; gap: 4px; align-items: center; margin-top: 5px; flex-wrap: wrap; }

  /* SUMMARY */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-family: var(--display); font-size: clamp(20px, 4vw, 28px); font-weight: 700; color: var(--text); line-height: 1; }

  .activity-summary-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    overflow: hidden;
    transition: border-left-color 0.15s;
  }
  .activity-summary-row:hover { border-left-color: var(--accent2); }
  .activity-summary-header {
    padding: 11px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .activity-summary-header:hover { background: var(--surface2); }
  .activity-summary-name { font-weight: 600; font-size: var(--base-font); }
  .activity-summary-stats { font-size: var(--xs-font); color: var(--text3); font-family: var(--mono); margin-top: 2px; letter-spacing: 0.02em; }
  .activity-instances { display: none; border-top: 1px solid var(--border); }
  .activity-instances.open { display: block; }
  .instance-table { width: 100%; border-collapse: collapse; font-size: var(--xs-font); font-family: var(--mono); }
  .instance-table th { background: var(--surface2); padding: 6px 10px; text-align: left; color: var(--text3); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; font-size: 10px; }
  .instance-table td { padding: 6px 10px; border-top: 1px solid var(--border); }
  .instance-table tr:hover td { background: var(--surface2); }
  .chevron { font-size: 10px; color: var(--text3); transition: transform 0.18s; }
  .chevron.open { transform: rotate(90deg); }

  /* MANAGE */
  .activity-manage-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .activity-name-edit { flex: 1; }

  /* TOGGLE SWITCH */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 22px;
    cursor: pointer;
    transition: background 0.18s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.18s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent2); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
  .toggle-label { font-size: var(--sm-font); font-weight: 500; color: var(--text); }

  /* SEARCH BAR */
  .search-bar { margin-bottom: 10px; }
  .search-bar input { border-radius: 3px; padding: 8px 12px; font-size: var(--sm-font); }

  /* NOTICES */
  .notice {
    background: var(--blue-bg);
    border: 1px solid var(--blue);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius);
    padding: 9px 14px;
    font-size: var(--sm-font);
    font-weight: 500;
    color: var(--blue);
    margin-bottom: 10px;
  }
  .notice-amber {
    background: var(--amber-bg);
    border-color: var(--amber);
    border-left-color: var(--amber);
    color: var(--amber);
  }
  .empty-state {
    text-align: center;
    color: var(--text3);
    padding: 48px 0;
    font-size: var(--sm-font);
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }

  /* MODAL / BOTTOM SHEET */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 8px 8px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 22px var(--pad) 34px;
    animation: slideUp 0.2s ease;
    border-top: 2px solid var(--accent);
  }
  @media (min-width: 768px) {
    .modal-overlay { align-items: center; }
    .modal-sheet { border-radius: 6px; max-width: 520px; max-height: 75vh; border-top-width: 2px; }
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @media (min-width: 768px) {
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  }
  .modal-title {
    font-family: var(--display);
    font-size: clamp(18px, 3vw, 22px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text2);
    padding: 2px 8px;
    font-family: var(--mono);
    transition: all 0.12s;
  }
  .modal-close:hover { background: var(--surface2); color: var(--text); }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* PROFILE ITEMS */
  .profile-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    background: var(--surface);
    transition: border-color 0.12s;
  }
  .profile-item.active { border-color: var(--accent); border-left: 3px solid var(--accent); }
  .profile-item-name { flex: 1; font-size: var(--sm-font); font-weight: 600; }

  /* STUDY ITEMS */
  .study-item {
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.12s;
  }
  .study-item:hover { border-color: var(--text3); }
  .study-item.active { border-color: var(--accent); border-left: 3px solid var(--accent); }
  .study-item-info { flex: 1; min-width: 0; }
  .study-item-name { font-weight: 600; font-size: var(--sm-font); }
  .study-item-meta { font-size: var(--xs-font); color: var(--text3); font-family: var(--mono); margin-top: 2px; }

  /* RECYCLE BIN ENTRIES */
  .bin-entry {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    background: var(--surface);
  }
  .bin-entry-info { flex: 1; font-size: var(--sm-font); }
  .bin-entry-name { font-weight: 600; }

  /* LIGHTBOX */
  #lightbox {

  /* THEME PICKER — 3-way segmented control */
  .theme-picker {

  /* NOTES FAB — floating action button, always visible bottom-left */
  .notes-fab {

  /* COLLAPSIBLE SESSION CARDS */

  /* ACTIVITY COLOUR left-bar on session cards */

  /* MAIN LAYOUT */
  #main-layout {
    display: flex;

  @media (min-width: 900px) {
    #main-layout { display: grid; grid-template-columns: 200px 1fr; flex: unset; }

  /* ── Desktop sidebar tweaks ── */

</style>

<body>
<div id="app">
  <div id="top-bar">
    <div>
      <div id="top-bar-title">Time Study V2</div>
      <div id="top-bar-sub">No study selected</div>
    </div>
    <button id="profile-chip" onclick="openProfileModal()">Profile</button>
  </div>
  <div id="storage-warn">⚠ Storage nearly full. Export data to free space.</div>
  <div id="main-layout">
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('live')">▶ Live</button>
    <button class="tab-btn" onclick="switchTab('manual')">✎ Manual</button>
    <button class="tab-btn" onclick="switchTab('log')">📋 Log</button>
    <button class="tab-btn" onclick="switchTab('summary')">📊 Summary</button>

<!-- Recycle Bin Modal -->

<script>
// ===== GLOBALS =====
let db = null;
let activeSessions = []; // [{id, activityName, startTs, paused, pausedAt, totalPausedMs, note, exception}]
let timerInterval = null;
let activeTab = 'live';
let notesDebounce = null;
let expandedAccordions = {};
let logFilter = '';

// ===== THEME =====
// Resolves the saved preference ('light' | 'dark' | 'device') and sets
// data-theme on <html> so every CSS variable cascades correctly.
function applyTheme(preference) {
  preference = preference || (db && db.settings && db.settings.theme) || 'device';
  let resolved;
  if (preference === 'device') {
    resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  } else {
    resolved = preference; // 'light' or 'dark'
  }
  document.documentElement.setAttribute('data-theme', resolved);
}

// Re-apply theme if the OS dark/light preference changes at runtime
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (!db || db.settings.theme === 'device') applyTheme('device');
});

function setTheme(preference) {
  db.settings.theme = preference;
  saveDb();
  applyTheme(preference);
  renderSettings(); // refresh the active button state
}

// ===== DB HELPERS =====
function generateId() {
  try { return crypto.randomUUID(); } catch(e) { return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2); }
}

function defaultDb() {
  const profileId = generateId();
  const studyId = generateId();
  return {
    activeProfileId: profileId,
    profiles: [{
      id: profileId,
      name: 'Default',
      createdAt: new Date().toISOString(),
      studies: [{
        id: studyId,
        name: 'Study 1',
        date: todayStr(),
        activities: [],
        entries: [],
        manualStd: {},
        quickAddPinned: null,   // null = show all eligible; array = user-selected subset
        activityGroups: [],     // [{id, name, color, activities:[]}]
        quickStartPinned: null, // null = show all; array = user-selected for Quick Start Timer
        activityColors: {},     // { activityName: hexColor }
        activityNotes: {}       // { activityName: descriptionText }
      }],
      activeStudyId: studyId,
      notes: ''
    }],
    settings: { hourMode: '12', recycleBinEnabled: true, theme: 'device' },
    recyclebin: []
  };
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function loadDb() {
  // Migration from V1
  const v1Raw = localStorage.getItem('timeStudyDb');
  if (v1Raw && !localStorage.getItem('timeStudyDb_v2')) {
    try {
      const v1 = JSON.parse(v1Raw);
      const profileId = generateId();
      const migratedDb = defaultDb();
      migratedDb.activeProfileId = profileId;
      migratedDb.profiles = [{
        id: profileId,
        name: 'Imported (V1)',
        createdAt: new Date().toISOString(),
        studies: (v1.studies || []).map(s => ({
          id: s.id || generateId(),
          name: s.name || 'Study',
          date: s.date || todayStr(),
          activities: s.activities || [],
          entries: (s.entries || []).map(e => ({
            ...e,
            id: e.id || Date.now(),
            startTs: e.startTs || Date.now(),
            endTs: e.endTs || Date.now(),
            deletedAt: null
          })),
          manualStd: s.manualStd || {},
          quickAddPinned: s.quickAddPinned || null,
          activityGroups: s.activityGroups || []
        })),
        activeStudyId: v1.activeStudyId || (v1.studies && v1.studies[0] && v1.studies[0].id) || generateId(),
        notes: ''
      }];
      migratedDb.settings = v1.settings || migratedDb.settings;
      localStorage.setItem('timeStudyDb_v2', JSON.stringify(migratedDb));
      localStorage.removeItem('timeStudyDb');
      db = migratedDb;
      showNotice('V1 data imported successfully.', 'blue');
      return;
    } catch(e) { /* ignore migration errors */ }
  }

  const raw = localStorage.getItem('timeStudyDb_v2');
  if (raw) {
    try { db = JSON.parse(raw); }
    catch(e) { db = defaultDb(); }
  } else {
    db = defaultDb();
  }
  // Auto-purge recycle bin (30 days)
  const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
  db.recyclebin = (db.recyclebin || []).filter(e => !e.deletedAt || e.deletedAt > cutoff);
  // Migrate theme field for existing users who have no theme key yet
  if (!db.settings.theme) db.settings.theme = 'device';
  // Migrate quickAddPinned, activityGroups, quickStartPinned for existing studies
  db.profiles.forEach(p => p.studies.forEach(s => {
    if (!('quickAddPinned'   in s)) s.quickAddPinned   = null;
    if (!s.activityGroups)          s.activityGroups   = [];
    if (!('quickStartPinned' in s)) s.quickStartPinned = null;
    if (!s.activityColors)          s.activityColors   = {};
    if (!s.activityNotes)           s.activityNotes    = {};
  }));

  saveDb();
}

function checkStorage() {
  try {
    const bytes = new Blob([localStorage.getItem('timeStudyDb_v2') || '']).size;
    const warn = document.getElementById('storage-warn');
    if (warn) warn.style.display = bytes > 7 * 1024 * 1024 ? 'block' : 'none';
  } catch(e) {}
}

// ===== TIME HELPERS =====
function secsToStr(n) {
  n = Math.max(0, Math.floor(n));
  const h = Math.floor(n / 3600);
  const m = Math.floor((n % 3600) / 60);
  const s = n % 60;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function formatTime(ts, mode) {
  if (!ts) return '--:--:--';
  mode = mode || (db && db.settings && db.settings.hourMode) || '12';
  const d = (typeof ts === 'number') ? new Date(ts) : new Date(ts);
  if (mode === '24') {
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  } else {
    let h = d.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}`;
  }
}

// Always display time from epoch timestamp when available — avoids
// any stale AM/PM in the stored string. Falls back to parsing the
// stored HH:MM:SS string only when no ts is available.
function displayTime(entry, field, mode) {
  mode = mode || (db && db.settings && db.settings.hourMode) || '12';
  const tsKey = field === 'start' ? 'startTs' : 'endTs';
  if (entry[tsKey]) return formatTime(entry[tsKey], mode);
  return formatTimeStr(entry[field], mode);
}

function formatTimeStr(hms, mode) {
  if (!hms) return '';
  mode = mode || (db && db.settings && db.settings.hourMode) || '12';
  // Strip any existing AM/PM suffix so we always parse clean 24h
  const clean = hms.replace(/\s*(AM|PM)$/i, '').trim();
  const parts = clean.split(':');
  if (parts.length < 2) return hms;
  let h = parseInt(parts[0], 10);
  const m = parts[1] || '00';
  const s = parts[2] || '00';
  if (mode === '24') return `${pad(h)}:${m}:${s}`;
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${pad(h)}:${m}:${s} ${ampm}`;
}

function nowTimeStr() {
  return formatTime(Date.now(), db.settings.hourMode);
}

function nowHMS() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function hmsToDate(hms) {
  const [h, m, s] = hms.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, s, 0);
  return d;
}

function hmsToTs(hms) {
  return hmsToDate(hms).getTime();
}

function hmsToSecs(hms) {
  const [h, m, s] = (hms || '00:00:00').split(':').map(Number);
  return h * 3600 + m * 60 + (s || 0);
}

// ===== TIMER ENGINE =====
function startTimerInterval() {
  if (timerInterval) return;
  timerInterval = setInterval(tickTimers, 1000);
}

function stopTimerInterval() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function tickTimers() {
  if (activeTab !== 'live') return;
  // If any input/textarea is focused, only update the timer digits in-place
  // — never rebuild the DOM while the keyboard is open, as it dismisses it.
  const focused = document.activeElement;
  const keyboardOpen = focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA' || focused.tagName === 'SELECT');
  if (keyboardOpen) {
    tickTimersInPlace();
  } else {
    renderLive();
  }
}

// Update only the timer display spans without touching the rest of the DOM
function tickTimersInPlace() {
  activeSessions.forEach(s => {
    const el = document.getElementById('timer-' + s.id);
    if (el) el.textContent = secsToStr(getElapsed(s));
  });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) render();
});

// ===== SESSIONS =====
function getElapsed(session) {
  if (session.paused) return Math.floor((session.pausedAt - session.startTs - session.totalPausedMs) / 1000);
  return Math.floor((Date.now() - session.startTs - session.totalPausedMs) / 1000);
}

function startSession(activityName) {
  haptic(40); // short pulse — timer started
  const id = generateId();
  activeSessions.push({
    id, activityName,
    startTs: Date.now(),
    paused: false,
    pausedAt: null,
    totalPausedMs: 0,
    note: '',
    exception: false
  });
  startTimerInterval();
  renderLive();
}

function pauseSession(id) {
  const s = activeSessions.find(s => s.id === id);
  if (!s || s.paused) return;
  haptic(30);
  s.paused = true;
  s.pausedAt = Date.now();
  renderLive();
}

function resumeSession(id) {
  const s = activeSessions.find(s => s.id === id);
  if (!s || !s.paused) return;
  haptic(40);
  s.totalPausedMs += Date.now() - s.pausedAt;
  s.paused = false;
  s.pausedAt = null;
  renderLive();
}

function stopAndSave(id) {
  const s = activeSessions.find(sess => sess.id === id);
  if (!s) return;
  haptic([40, 60, 40]); // double pulse — saved
  const endTs = Date.now();
  const duration = getElapsed(s);
  const study = currentStudy();
  if (!study) { alert('No active study.'); return; }

  const entry = {
    id: Date.now(),
    activity: s.activityName,
    date: todayStr(),
    start: formatTime(s.startTs, '24'),
    end: formatTime(endTs, '24'),
    startTs: s.startTs,
    endTs: endTs,
    duration: duration,
    note: s.note,
    exception: s.exception,
    images: SESSION_IMAGES[id] || [],
    deletedAt: null
  };
  delete SESSION_IMAGES[id];
  study.entries.push(entry);
  saveDb();
  activeSessions = activeSessions.filter(sess => sess.id !== id);
  if (activeSessions.length === 0) stopTimerInterval();
  renderLive();
}

function discardSession(id) {
  activeSessions = activeSessions.filter(s => s.id !== id);
  if (activeSessions.length === 0) stopTimerInterval();
  renderLive();
}

function toggleQuickAddEdit() {

function toggleQuickAddPin(activityName, checked) {
  const study = currentStudy();
  if (!study) return;
  const allEligible = study.activities.filter(a => study.manualStd[a] || getAutoAvg(study, a));

  // Start from current pinned state (null = all checked)
  let pinned = study.quickAddPinned === null
    ? [...allEligible]
    : [...study.quickAddPinned];

  if (checked) {
    if (!pinned.includes(activityName)) pinned.push(activityName);
  } else {
    pinned = pinned.filter(a => a !== activityName);

  // If every eligible activity is checked, revert to null (show all)
  study.quickAddPinned = pinned.length === allEligible.length ? null : pinned;
  saveDb();

  _refreshQuickAddButtons();
}

function quickStartTimer(activityName) {
  // If a session for this activity is already running, just scroll to it
  const existing = activeSessions.find(s => s.activityName === activityName && !s.paused);
  if (existing) {
    const el = document.getElementById(`sess-${existing.id}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    showNotice(`${activityName} is already running.`, 'amber');
    return;
  }
  startSession(activityName);
}

function quickAddEntry(activityName) {
  const study = currentStudy();
  const std = study.manualStd[activityName] || getAutoAvg(study, activityName);
  if (!std) return;
  const endTs = Date.now();
  const startTs = endTs - std * 1000;
  const endHMS = formatTime(endTs, '24');
  const startHMS = formatTime(startTs, '24');
  study.entries.push({
    id: Date.now(),
    activity: activityName,
    date: todayStr(),
    start: startHMS,
    end: endHMS,
    startTs,
    endTs,
    duration: std,
    note: '',
    exception: false,
    images: [],
    deletedAt: null
  });
  saveDb();
  showNotice(`✓ Added "${activityName}" — ${secsToStr(std)}`);
  renderLive();
}

// ===== TAB SWITCHING =====
function switchTab(tab) {
  activeTab = tab;
  // Remove Log tab FAB when leaving the log
  const fab = document.getElementById('bin-fab-wrap');
  if (fab) fab.remove();
  // Close notes panel when switching tabs; update FAB visibility
  _closeNotesPanel();
  _updateNotesFabVisibility();
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    const tabs = ['live','manual','log','summary','charts','notes','manage','studies','settings'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  // Push a history entry so the browser back button navigates between tabs.
  // Use replaceState for the very first tab to avoid a dead initial entry.
  const state = { tab };
  if (history.state && history.state.tab) {
    history.pushState(state, '', '');
  } else {
    history.replaceState(state, '', '');
  }
  render();
}

// ── Back-navigation handling ──────────────────────────────────────────────────
// On popstate (back button), restore the tab from history state.
// When there's nothing left to pop (state is null) on mobile, require a second
// back press within 2 s to actually exit the app.
let _backPressedOnce = false;
let _backToastEl     = null;

window.addEventListener('popstate', e => {
  if (e.state && e.state.tab) {
    // Navigate back to the tab in the history entry
    activeTab = e.state.tab;
    const fab = document.getElementById('bin-fab-wrap');
    if (fab) fab.remove();
    _closeNotesPanel();
    _updateNotesFabVisibility();
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      const tabs = ['live','manual','log','summary','charts','notes','manage','studies','settings'];
      b.classList.toggle('active', tabs[i] === e.state.tab);
    });
    render();
  } else {
    // No more history — on mobile show "press again to exit" toast
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                     (navigator.maxTouchPoints > 1 && window.innerWidth < 900);
    if (!isMobile) return; // desktop: let browser handle normally

    // Push a dummy state back so we stay in the app
    history.pushState({ tab: activeTab }, '', '');

    if (_backPressedOnce) {
      // Second back within 2 s — exit
      if (_backToastEl) _backToastEl.remove();
      history.go(-(history.length)); // try to close; works in some mobile browsers
      window.close();                // fallback
      return;
    }

    _backPressedOnce = true;

    // Show toast
    if (_backToastEl) _backToastEl.remove();
    _backToastEl = document.createElement('div');
    _backToastEl.textContent = 'Press back again to exit';
    _backToastEl.style.cssText = `
      position:fixed; bottom:calc(var(--tab-h) + 20px); left:50%;
      transform:translateX(-50%);
      background:rgba(15,14,12,0.88); color:#f0efe9;
      padding:10px 20px; border-radius:4px;
      font-size:13px; font-family:var(--font);
      z-index:9999; pointer-events:none;
      white-space:nowrap;
      box-shadow:0 2px 12px rgba(0,0,0,0.25);
    `;
    document.body.appendChild(_backToastEl);

    // Auto-dismiss after 2 s and reset flag
    setTimeout(() => {
      if (_backToastEl) { _backToastEl.remove(); _backToastEl = null; }
      _backPressedOnce = false;
    }, 2000);
  }
});

  updateTopBar();

  const tabs = {
    live: renderLive,

    log: renderLog,
    summary: renderSummary,

    notes: renderNotes,
    manage: renderManage,

function toggleSessionCollapse(id) {

  const body = card.querySelector('.session-card-body');

  if (body) body.classList.toggle('collapsed', isNowCollapsed);
  if (btn)  btn.textContent = isNowCollapsed ? '▼' : '▲';

}

// ===== IMAGE HANDLING =====
// Session images stored in memory (base64) until entry is saved
// Entry images stored in entry.images = [{id, dataUrl, caption, ts}]

const SESSION_IMAGES = {}; // { sessionId: [{id, dataUrl, caption, ts}] }

function sessionImgs(id) {
  if (!SESSION_IMAGES[id]) SESSION_IMAGES[id] = [];
  return SESSION_IMAGES[id];
}

function imgId() {
  return 'img-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
}

// Trigger file/camera input for a session
// ===== IMAGE COMPRESSION =====
// Resizes and re-encodes any image to JPEG before storing in localStorage.
// Max dimension 1024px, quality 0.82 — reduces a typical phone photo
// from ~5 MB raw to ~150–300 KB, allowing 15–30+ images before hitting limits.
function compressImage(file, callback) {
  const MAX_DIM = 1024;
  const QUALITY = 0.82;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      // Scale down only — never upscale small images
      if (width > MAX_DIM || height > MAX_DIM) {
        if (width >= height) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
        else                 { width = Math.round(width * MAX_DIM / height);  height = MAX_DIM; }
      }
      const canvas = document.createElement('canvas');
      canvas.width  = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', QUALITY));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Compress multiple files in parallel, preserve order, then call done(dataUrls[])
function compressAll(files, done) {
  const results = new Array(files.length);
  let remaining = files.length;
  if (remaining === 0) { done([]); return; }
  files.forEach((file, i) => {
    compressImage(file, dataUrl => {
      results[i] = dataUrl;
      if (--remaining === 0) done(results);
    });
  });
}

function sessionAddImage(sessionId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.multiple = true;
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = () => {
    const files = Array.from(inp.files || []);
    document.body.removeChild(inp);
    compressAll(files, dataUrls => {
      dataUrls.forEach(dataUrl => {
        sessionImgs(sessionId).push({ id: imgId(), dataUrl, caption: '', ts: Date.now() });
      });
      renderLive();
    });
  };
  inp.click();
}

// Trigger file/camera for an existing saved entry
function entryAddImage(entryId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.multiple = true;
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = () => {
    const study = currentStudy();
    const entry = study && study.entries.find(e => e.id === entryId);
    if (!entry) { document.body.removeChild(inp); return; }
    if (!entry.images) entry.images = [];
    const files = Array.from(inp.files || []);
    document.body.removeChild(inp);
    compressAll(files, dataUrls => {
      dataUrls.forEach(dataUrl => {
        entry.images.push({ id: imgId(), dataUrl, caption: '', ts: Date.now() });
      });
      saveDb();
      renderLog();
    });
  };
  inp.click();
}

function sessionDeleteImage(sessionId, imgId) {
  SESSION_IMAGES[sessionId] = (SESSION_IMAGES[sessionId] || []).filter(i => i.id !== imgId);

}

function renderSessionImgStrip(sessionId) {
  const imgs = sessionImgs(sessionId);
  let html = `<div class="img-strip">`;
  imgs.forEach(img => {
    html += `<div class="img-thumb-wrap" onclick="openLightboxSession('${sessionId}','${img.id}')">

             </div>`;
  });
  html += `<div class="img-add-btn" onclick="sessionAddImage('${sessionId}')">📷 Add photo</div>`;
  html += `</div>`;
  return html;
}

// Render image strip for a saved entry (in log)
function renderEntryImgStrip(entry) {
  const imgs = entry.images || [];
  if (imgs.length === 0) return `<div class="img-strip">
    <div class="img-add-btn" onclick="entryAddImage(${entry.id})">📷 Add photo</div>
  </div>`;
  let html = `<div class="img-strip">`;
  imgs.forEach(img => {
    html += `<div class="img-thumb-wrap" onclick="openLightboxEntry(${entry.id},'${img.id}')">
               <img src="${img.dataUrl}" alt="">
             </div>`;
  });
  html += `<div class="img-add-btn" onclick="entryAddImage(${entry.id})">📷 Add photo</div>`;
  html += `</div>`;
  return html;
}

// ===== LIGHTBOX =====
let lbCtx = null; // { type:'session'|'entry', sessionId/entryId, imgId }

function lbGetImgs() {
  if (!lbCtx) return [];
  if (lbCtx.type === 'session') return sessionImgs(lbCtx.sessionId);
  if (lbCtx.type === 'manual') return manImages;
  const study = currentStudy();
  const entry = study && study.entries.find(e => e.id === lbCtx.entryId);
  return entry ? (entry.images || []) : [];
}

function lbCurrentIdx() {
  return lbGetImgs().findIndex(i => i.id === lbCtx.imgId);
}

function openLightboxSession(sessionId, imgId) {
  lbCtx = { type: 'session', sessionId, imgId };
  lbShow();
}

function openLightboxEntry(entryId, imgId) {
  lbCtx = { type: 'entry', entryId, imgId };
  lbShow();
}

function lbShow() {
  const imgs = lbGetImgs();
  const idx = lbCurrentIdx();
  if (idx === -1 || !imgs[idx]) return;
  const img = imgs[idx];
  document.getElementById('lightbox-img').src = img.dataUrl;
  document.getElementById('lightbox-caption').textContent =
    `${idx + 1} / ${imgs.length}${img.caption ? '  ·  ' + img.caption : ''}`;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  lbCtx = null;
}

function lbClose(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }

function lbPrev() {
  const imgs = lbGetImgs();
  const idx = lbCurrentIdx();
  if (idx > 0) { lbCtx.imgId = imgs[idx - 1].id; lbShow(); }
}

function lbNext() {
  const imgs = lbGetImgs();
  const idx = lbCurrentIdx();
  if (idx < imgs.length - 1) { lbCtx.imgId = imgs[idx + 1].id; lbShow(); }
}

function lbDelete() {
  if (!confirm('Remove this image?')) return;
  if (lbCtx.type === 'session') {
    SESSION_IMAGES[lbCtx.sessionId] = (SESSION_IMAGES[lbCtx.sessionId] || []).filter(i => i.id !== lbCtx.imgId);
  } else {
    const study = currentStudy();
    const entry = study && study.entries.find(e => e.id === lbCtx.entryId);
    if (entry) { entry.images = (entry.images || []).filter(i => i.id !== lbCtx.imgId); saveDb(); }
  }
  const imgs = lbGetImgs();
  if (imgs.length === 0) { closeLightbox(); if (activeTab === 'log') renderLog(); else renderLive(); return; }
  const newIdx = Math.min(lbCurrentIdx(), imgs.length - 1);
  lbCtx.imgId = imgs[Math.max(0, newIdx === -1 ? 0 : newIdx)].id;
  lbShow();
  if (activeTab === 'log') renderLog(); else renderLive();
}

function lbDownload() {
  const imgs = lbGetImgs();
  const idx = lbCurrentIdx();
  if (idx === -1) return;
  const a = document.createElement('a');
  a.href = imgs[idx].dataUrl;
  a.download = `timestudy-img-${Date.now()}.jpg`;
  a.click();
}

// Keyboard nav for lightbox
document.addEventListener('keydown', e => {
  if (!lbCtx) return;
  if (e.key === 'ArrowLeft') lbPrev();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'Escape') closeLightbox();
});

  if (study && !study.activities.includes(act)) {

    saveDb();
    renderManual();

      const sel = document.getElementById('man-act-select');
      if (sel) sel.value = act;

function manSave() {
  let act = document.getElementById('man-act-select').value;
  const newAct = document.getElementById('man-new-act').value.trim();
  if (!act && newAct) act = newAct;
  if (!act) { alert('Select or enter an activity.'); return; }

  const startHMS = document.getElementById('man-start').value;
  const endHMS = document.getElementById('man-end').value;
  const startSecs = hmsToSecs(startHMS);
  const endSecs = hmsToSecs(endHMS);

  if (endSecs <= startSecs) { alert('End time must be after start time.'); return; }

  const study = currentStudy();
  if (!study) { alert('No active study.'); return; }

  if (!study.activities.includes(act)) study.activities.push(act);

  const startTs = hmsToTs(startHMS);
  const endTs = hmsToTs(endHMS);

  study.entries.push({
    id: Date.now(),
    activity: act,
    date: todayStr(),
    start: startHMS,
    end: endHMS,
    startTs,
    endTs,
    duration: endSecs - startSecs,
    note: document.getElementById('man-note').value,
    exception: document.getElementById('man-exception').checked,
    images: [...manImages],
    deletedAt: null
  });
  manImages = [];
  saveDb();
  showNotice('Entry saved!');
  renderManual();
}

function _renderLogEntries() {
  const study   = currentStudy();
  const mode    = db.settings.hourMode;
  const entries = (study ? study.entries : []).filter(e => !e.deletedAt);

  const filtered = logFilter
    ? entries.filter(e => e.activity.toLowerCase().includes(logFilter.toLowerCase()))
    : entries;

  const sorted = [...filtered].sort((a, b) => (b.startTs || 0) - (a.startTs || 0));
  const groups = {};
  sorted.forEach(e => { (groups[e.date] = groups[e.date] || []).push(e); });
  const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  // Update the count label without touching the filter input
  const countLabel = document.getElementById('log-count-label');
  if (countLabel) countLabel.textContent = `${filtered.length} entr${filtered.length === 1 ? 'y' : 'ies'}`;

  let html = '';

  if (dates.length === 0) {
    html = `<div class="empty-state">${logFilter ? 'No matching entries.' : 'No entries yet.'}</div>`;
  }

  dates.forEach(date => {
    html += `<div class="date-heading">${date}</div>`;
    groups[date].forEach(e => {
      const dur     = secsToStr(e.duration);
      const timeRange = `${displayTime(e, 'start', mode)} → ${displayTime(e, 'end', mode)}`;
      const imgCount  = (e.images || []).length;
      const grp       = getActivityGroup(study, e.activity);
      const eColor    = getActivityColor(study, e.activity);
      const activityOptions = (study ? study.activities : [])
        .map(a => `<option value="${esc(a)}" ${a === e.activity ? 'selected' : ''}>${esc(a)}</option>`)
        .join('');
      html += `
      <div class="entry-row-wrap">
        <div class="swipe-delete-bg">🗑</div>
        <div class="entry-row-inner">
        <div class="entry-row" id="entry-row-${e.id}" style="flex-direction:column;align-items:stretch;${eColor ? `border-left-color:${eColor};` : ''}">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div class="entry-info">
            <div class="entry-activity" id="act-label-${e.id}">${esc(e.activity)}</div>
            <div class="entry-times">${timeRange} · ${dur}</div>

    // Attach swipe-to-delete handlers
    container.querySelectorAll('.entry-row-wrap').forEach(wrap => {
      const inner = wrap.querySelector('.entry-row-inner');
      const bg    = wrap.querySelector('.swipe-delete-bg');
      if (!inner) return;
      let startX = 0, startY = 0, dx = 0, swiping = false;
      inner.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        dx = 0; swiping = false;
      }, { passive: true });
      inner.addEventListener('touchmove', e => {
        const moveX = e.touches[0].clientX - startX;
        const moveY = e.touches[0].clientY - startY;
        if (!swiping && Math.abs(moveY) > Math.abs(moveX)) return;
        if (moveX > 0) return;
        swiping = true;
        dx = Math.max(moveX, -120);
        inner.style.transition = 'none';
        inner.style.transform  = `translateX(${dx}px)`;
        wrap.classList.toggle('swiping', dx < -20);
        bg.style.opacity = Math.min(Math.abs(dx) / 80, 1);
      }, { passive: true });
      inner.addEventListener('touchend', () => {
        inner.style.transition = '';
        if (dx < -80) {
          inner.style.transform = 'translateX(-100%)';
          bg.style.opacity = '1';
          const entryRow = wrap.querySelector('[id^="entry-row-"]');
          const entryId  = entryRow ? parseInt(entryRow.id.replace('entry-row-', '')) : null;
          if (entryId !== null) { haptic([30, 50, 30]); setTimeout(() => logDelete(entryId), 220); }
        } else {
          inner.style.transform = 'translateX(0)';
          bg.style.opacity = '0';
          wrap.classList.remove('swiping');
        }
        dx = 0;
      });
    });
  }
}

function toggleReclassify(id) {

  const study = currentStudy();
  if (!study) return;
  const entry = study.entries.find(e => e.id === id);
  if (!entry) return;
  const oldActivity = entry.activity;
  if (newActivity === oldActivity) {
    cancelReclassify(id);
    return;
  }
  entry.activity = newActivity;
  saveDb();
  // Update the activity label in place — no full re-render
  const label = document.getElementById(`act-label-${id}`);
  if (label) label.textContent = newActivity;
  // Close the panel
  const panel = document.getElementById(`reclass-edit-${id}`);
  const btn   = document.getElementById(`reclass-btn-${id}`);
  if (panel) panel.style.display = 'none';
  if (btn)   { btn.textContent = '🔀'; btn.title = 'Reclassify activity'; }
  showNotice(`Reclassified: ${oldActivity} → ${newActivity}`);

// When start time changes — recalculate duration from start→end
function onDurStartChange(id) {
  const startEl = document.getElementById(`dur-start-${id}`);
  const endEl   = document.getElementById(`dur-end-${id}`);
  const hmsEl   = document.getElementById(`dur-hms-${id}`);
  if (!startEl || !endEl || !hmsEl) return;
  const startSecs = _timeStrToSecs(startEl.value);
  const endSecs   = _timeStrToSecs(endEl.value);
  if (startSecs === null || endSecs === null) return;
  let diff = endSecs - startSecs;
  if (diff < 0) diff += 86400; // crossed midnight
  hmsEl.value = secsToHMSInput(diff);
  _durHint(id, diff);
}

// When end time changes — recalculate duration from start→end
function onDurEndChange(id) {
  onDurStartChange(id); // same logic
}

// When HH:MM:SS duration changes — recalculate end time from start + duration
function onDurHmsChange(id) {
  const startEl = document.getElementById(`dur-start-${id}`);
  const endEl   = document.getElementById(`dur-end-${id}`);
  const hmsEl   = document.getElementById(`dur-hms-${id}`);
  if (!startEl || !endEl || !hmsEl) return;
  const startSecs = _timeStrToSecs(startEl.value);
  const durSecs   = _timeStrToSecs(hmsEl.value);
  if (startSecs === null || durSecs === null) return;
  const endSecs   = (startSecs + durSecs) % 86400;
  endEl.value = secsToHMSInput(endSecs);
  _durHint(id, durSecs);
}

function _timeStrToSecs(str) {
  if (!str) return null;
  const parts = str.split(':').map(Number);
  if (parts.length < 2) return null;
  const h = parts[0] || 0, m = parts[1] || 0, s = parts[2] || 0;
  return h * 3600 + m * 60 + s;
}

function _durHint(id, secs) {
  const hint = document.getElementById(`dur-hint-${id}`);
  if (hint && secs > 0) hint.textContent = `New duration: ${secsToStr(secs)}`;
}

function saveDurationEdit(id) {
  const hmsEl   = document.getElementById(`dur-hms-${id}`);
  const startEl = document.getElementById(`dur-start-${id}`);
  const endEl   = document.getElementById(`dur-end-${id}`);
  if (!hmsEl) return;
  const newDur    = _timeStrToSecs(hmsEl.value);
  const newStart  = _timeStrToSecs(startEl ? startEl.value : null);
  const newEnd    = _timeStrToSecs(endEl   ? endEl.value   : null);
  if (newDur === null || newDur <= 0) {
    alert('Duration must be greater than zero.');
    return;
  }
  const study = currentStudy();
  if (!study) return;
  const entry = study.entries.find(e => e.id === id);
  if (!entry) return;

  const oldDur = entry.duration;
  entry.duration = newDur;

  // Update timestamps if we have valid times
  if (newStart !== null) {
    const baseDate = new Date(entry.startTs || Date.now());
    const newStartTs = new Date(baseDate);
    newStartTs.setHours(Math.floor(newStart / 3600), Math.floor((newStart % 3600) / 60), newStart % 60, 0);
    entry.startTs = newStartTs.getTime();
    entry.start   = newStartTs.toTimeString().slice(0, 8);
  }
  if (newEnd !== null) {
    const baseDate = new Date(entry.endTs || Date.now());
    const newEndTs = new Date(baseDate);
    newEndTs.setHours(Math.floor(newEnd / 3600), Math.floor((newEnd % 3600) / 60), newEnd % 60, 0);
    // Handle midnight crossing
    if (newEnd < (newStart || 0)) newEndTs.setDate(newEndTs.getDate() + 1);
    entry.endTs = newEndTs.getTime();
    entry.end   = newEndTs.toTimeString().slice(0, 8);
  }

  saveDb();

  // Update the time display in place
  const timesEl = document.querySelector(`#entry-row-${id} .entry-times`);
  if (timesEl) {
    const mode = db.settings.hourMode;
    timesEl.textContent = `${displayTime(entry, 'start', mode)} → ${displayTime(entry, 'end', mode)} · ${secsToStr(entry.duration)}`;
  }

  // Close panel
  const panel = document.getElementById(`dur-edit-${id}`);
  const btn   = document.getElementById(`dur-btn-${id}`);
  if (panel) panel.style.display = 'none';
  if (btn)   { btn.textContent = '⏱'; btn.title = 'Edit duration'; }
  showNotice(`Duration updated: ${secsToStr(oldDur)} → ${secsToStr(newDur)}`);
}

function cancelDurationEdit(id) {
  const study = currentStudy();

    const hmsEl   = document.getElementById(`dur-hms-${id}`);

function logDelete(id) {
  if (!confirm('Move this entry to the recycle bin?')) return;
  const study = currentStudy();
  if (!study) return;
  const idx = study.entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  const entry = study.entries.splice(idx, 1)[0];
  entry.deletedAt = Date.now();
  entry._studyId = study.id;
  entry._profileId = db.activeProfileId;
  db.recyclebin.push(entry);
  saveDb();
  renderLog();
}

function logClearAll() {
  if (!confirm('Move ALL entries to recycle bin?')) return;
  const study = currentStudy();
  if (!study) return;
  study.entries.forEach(e => {
    e.deletedAt = Date.now();
    e._studyId = study.id;
    e._profileId = db.activeProfileId;
    db.recyclebin.push(e);
  });
  study.entries = [];
  saveDb();
  renderLog();
}

// ── Shared chart helpers ──────────────────────────────────────────────────────
const CHART_COLORS = ['#1a6b3a','#1a4a8a','#8a5a00','#8a1a1a','#4a1a8a','#1a6b6b','#6b1a6b','#3a6b1a','#6b3a1a','#1a3a6b'];

function svgEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function makeAxes(W, H, ml, mr, mt, mb, xLabels, yTicks, title) {
  const iW = W - ml - mr;
  const iH = H - mt - mb;
  let s = `<line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+iH}" stroke="var(--border)" stroke-width="1.5"/>
           <line x1="${ml}" y1="${mt+iH}" x2="${ml+iW}" y2="${mt+iH}" stroke="var(--border)" stroke-width="1.5"/>`;
  // y grid lines
  yTicks.forEach(t => {
    const y = mt + iH - t.frac * iH;
    s += `<line x1="${ml}" y1="${y}" x2="${ml+iW}" y2="${y}" stroke="var(--border)" stroke-width="0.7" stroke-dasharray="3,3"/>
          <text x="${ml-6}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text2)" font-family="monospace">${svgEsc(t.label)}</text>`;
  });
  // x labels
  xLabels.forEach(l => {
    s += `<text x="${l.x}" y="${mt+iH+14}" text-anchor="middle" font-size="10" fill="var(--text2)" font-family="monospace"
            transform="rotate(-28,${l.x},${mt+iH+14})">${svgEsc(l.label)}</text>`;
  });
  return s;
}

function yTicksFrac(maxVal, steps) {
  const step = niceStep(maxVal, steps);
  const ticks = [];
  for (let v = step; v <= maxVal * 1.01; v += step) {
    ticks.push({ frac: v / maxVal, label: fmtTickVal(v) });
  }
  return ticks;
}

function niceStep(maxVal, steps) {
  const raw = maxVal / steps;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  const nice = norm < 1.5 ? 1 : norm < 3.5 ? 2 : norm < 7.5 ? 5 : 10;
  return nice * mag;
}

function fmtTickVal(v) {
  if (v >= 3600) return (v/3600).toFixed(1) + 'h';
  if (v >= 60) return Math.round(v/60) + 'm';
  return Math.round(v) + 's';
}

function truncLabel(s, n) { return s.length > n ? s.slice(0, n-1) + '…' : s; }

// ── Chart 1: Pareto ───────────────────────────────────────────────────────────
function drawPareto(entries, W) {
  // Aggregate total time per activity, sort descending
  const map = {};
  entries.forEach(e => { map[e.activity] = (map[e.activity] || 0) + (e.duration || 0); });
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);
  if (!sorted.length) return;

  const total = sorted.reduce((s, [,v]) => s + v, 0);
  const N = sorted.length;
  const ml = 56, mr = 50, mt = 20, mb = 60;
  const H = Math.max(220, Math.min(320, 180 + N * 18));
  const iW = W - ml - mr;
  const iH = H - mt - mb;
  const maxVal = sorted[0][1];
  const barW = Math.max(6, Math.min(48, iW / N - 6));

  const yTicks = yTicksFrac(maxVal, 5);

  let bars = '', labels = [], cumPts = [];
  let cumSum = 0;

  sorted.forEach(([act, val], i) => {
    const x = ml + (i / N) * iW + (iW / N - barW) / 2;
    const barH = (val / maxVal) * iH;
    const y = mt + iH - barH;
    const color = CHART_COLORS[i % CHART_COLORS.length];
    cumSum += val;
    const cumFrac = cumSum / total;
    const cx = ml + (i / N) * iW + iW / (N * 2);
    const cy = mt + iH * (1 - cumFrac);

    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="3" opacity="0.88">
               <title>${svgEsc(act)}: ${secsToStr(val)} (${Math.round(val/total*100)}%)</title>
             </rect>`;
    cumPts.push([cx, cy]);
    labels.push({ x: cx, label: truncLabel(act, 10) });
  });

  // Cumulative % line
  let linePath = cumPts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  let dots = cumPts.map(([cx, cy], i) => {
    const cumFrac = sorted.slice(0, i+1).reduce((s,[,v])=>s+v,0)/total;
    return `<circle cx="${cx}" cy="${cy}" r="4" fill="var(--red)" stroke="white" stroke-width="1.5">
              <title>${Math.round(cumFrac*100)}% cumulative</title>
            </circle>`;
  }).join('');

  // Right axis: 0%–100%
  let rightAxis = '';
  [0,25,50,75,100].forEach(pct => {
    const y = mt + iH * (1 - pct/100);
    rightAxis += `<text x="${ml+iW+6}" y="${y+4}" font-size="9" fill="var(--red)" font-family="monospace">${pct}%</text>`;
  });

  // 80% line
  const y80 = mt + iH * 0.20;
  const axes = makeAxes(W, H, ml, mr, mt, mb, labels, yTicks, '');
  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    ${axes}
    ${bars}
    <path d="${linePath}" fill="none" stroke="var(--red)" stroke-width="2" stroke-dasharray="5,2"/>
    ${dots}
    ${rightAxis}
    <line x1="${ml}" y1="${y80}" x2="${ml+iW}" y2="${y80}" stroke="var(--red)" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
    <text x="${ml+iW-2}" y="${y80-4}" text-anchor="end" font-size="9" fill="var(--red)" font-family="monospace">80%</text>
  </svg>`;
  document.getElementById('chart-pareto').innerHTML = svg;
}

// ── Chart 2: Horizontal Bar (Time Share) ─────────────────────────────────────
function drawBar(entries, W) {
  const map = {};
  entries.forEach(e => { map[e.activity] = (map[e.activity] || 0) + (e.duration || 0); });
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);
  if (!sorted.length) return;

  const total = sorted.reduce((s,[,v]) => s+v, 0);
  const N = sorted.length;
  const rowH = 30, ml = 110, mr = 70, mt = 14, mb = 10;
  const H = mt + mb + N * rowH;
  const iW = W - ml - mr;
  const maxVal = sorted[0][1];

  let rows = '';
  sorted.forEach(([act, val], i) => {
    const y = mt + i * rowH;
    const barW = (val / maxVal) * iW;
    const color = CHART_COLORS[i % CHART_COLORS.length];
    const pct = Math.round(val / total * 100);
    rows += `
      <text x="${ml-8}" y="${y+19}" text-anchor="end" font-size="11" fill="var(--text2)" font-family="monospace">${svgEsc(truncLabel(act, 14))}</text>
      <rect x="${ml}" y="${y+6}" width="${barW}" height="18" fill="${color}" rx="3" opacity="0.85">
        <title>${svgEsc(act)}: ${secsToStr(val)} · ${pct}%</title>
      </rect>
      <text x="${ml+barW+5}" y="${y+19}" font-size="10" fill="var(--text)" font-family="monospace">${secsToStr(val)} (${pct}%)</text>
    `;
  });

  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <line x1="${ml}" y1="${mt}" x2="${ml}" y2="${H-mb}" stroke="var(--border)" stroke-width="1.5"/>
    ${rows}
  </svg>`;
  document.getElementById('chart-bar').innerHTML = svg;
}

// ── Chart 3: Daily Trend (entry count) ───────────────────────────────────────
function drawTrend(entries, W) {
  // Count entries per date
  const map = {};
  entries.forEach(e => { map[e.date] = (map[e.date] || 0) + 1; });
  const dates = Object.keys(map).sort();
  if (dates.length < 2) {
    document.getElementById('chart-trend').innerHTML =
      `<div class="empty-state" style="padding:20px 0">Need entries on at least 2 different dates.</div>`;
    return;
  }

  const vals = dates.map(d => map[d]);
  const maxVal = Math.max(...vals);
  const ml = 46, mr = 16, mt = 20, mb = 54;
  const H = 200;
  const iW = W - ml - mr;
  const iH = H - mt - mb;
  const N = dates.length;

  const pts = dates.map((d, i) => {
    const x = ml + (i / (N - 1)) * iW;
    const y = mt + iH - (vals[i] / maxVal) * iH;
    return [x, y, vals[i], d];
  });

  const yTicks = [];
  for (let v = 1; v <= maxVal; v++) {
    if (maxVal <= 8 || v % Math.ceil(maxVal / 5) === 0) {
      yTicks.push({ frac: v / maxVal, label: String(v) });
    }
  }

  // Area fill
  const areaPath = `M${pts[0][0]},${mt+iH} ` + pts.map(([x,y])=>`L${x},${y}`).join(' ') + ` L${pts[N-1][0]},${mt+iH} Z`;
  const linePath = pts.map(([x,y],i) => (i===0?`M${x},${y}`:`L${x},${y}`)).join(' ');

  const xLabels = [];
  // Show max ~6 x-labels to avoid crowding
  const step = Math.max(1, Math.ceil(N / 6));
  pts.forEach(([x,,, d], i) => {
    if (i % step === 0 || i === N - 1) xLabels.push({ x, label: d.slice(5) }); // MM-DD
  });

  const axes = makeAxes(W, H, ml, mr, mt, mb, xLabels, yTicks, '');
  const dots = pts.map(([x,y,v,d]) =>
    `<circle cx="${x}" cy="${y}" r="4" fill="var(--blue)" stroke="white" stroke-width="2">
       <title>${svgEsc(d)}: ${v} entr${v===1?'y':'ies'}</title>
     </circle>`).join('');

  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <defs>
      <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--blue)" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="var(--blue)" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${axes}
    <path d="${areaPath}" fill="url(#trendGrad)"/>
    <path d="${linePath}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
  document.getElementById('chart-trend').innerHTML = svg;
}

// ── Chart 4: Duration Histogram ───────────────────────────────────────────────
function drawHistogram(entries, W) {
  const durations = entries.map(e => e.duration || 0).filter(d => d > 0);
  if (!durations.length) return;

  const minD = Math.min(...durations);
  const maxD = Math.max(...durations);

  if (minD === maxD) {
    document.getElementById('chart-hist').innerHTML =
      `<div class="empty-state" style="padding:20px 0">All entries have identical duration (${secsToStr(minD)}) — no distribution to show.</div>`;
    return;
  }

  // Sturges' rule for bin count, capped 5–15
  const bins = Math.max(5, Math.min(15, Math.round(1 + Math.log2(durations.length))));
  const binSize = (maxD - minD) / bins;

  const counts = Array(bins).fill(0);
  durations.forEach(d => {
    let b = Math.floor((d - minD) / binSize);
    if (b >= bins) b = bins - 1;
    counts[b]++;
  });

  const maxCount = Math.max(...counts);
  const ml = 46, mr = 16, mt = 20, mb = 54;
  const H = 200;
  const iW = W - ml - mr;
  const iH = H - mt - mb;
  const barW = iW / bins - 2;

  const yTicks = yTicksFrac(maxCount, 4).map(t => ({ ...t, label: String(Math.round(t.frac * maxCount)) }));

  let bars = '', xLabels = [];
  counts.forEach((count, i) => {
    const x = ml + (i / bins) * iW + 1;
    const barH = (count / maxCount) * iH;
    const y = mt + iH - barH;
    const binStart = fmtTickVal(minD + i * binSize);
    const binEnd = fmtTickVal(minD + (i + 1) * binSize);
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="var(--green)" rx="3" opacity="0.8">
               <title>${binStart}–${binEnd}: ${count} entr${count===1?'y':'ies'}</title>
             </rect>`;
    if (i % Math.ceil(bins / 6) === 0 || i === bins - 1) {
      xLabels.push({ x: x + barW / 2, label: binStart });
    }
  });

  // Mean & std dev overlay
  const mean = durations.reduce((s, d) => s + d, 0) / durations.length;
  const stdDev = Math.sqrt(durations.reduce((s, d) => s + Math.pow(d - mean, 2), 0) / durations.length);
  const meanX = ml + ((mean - minD) / (maxD - minD)) * iW;

  const axes = makeAxes(W, H, ml, mr, mt, mb, xLabels, yTicks, '');
  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    ${axes}
    ${bars}
    <line x1="${meanX}" y1="${mt}" x2="${meanX}" y2="${mt+iH}" stroke="var(--amber)" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="${meanX+4}" y="${mt+12}" font-size="9" fill="var(--amber)" font-family="monospace">avg ${secsToStr(Math.round(mean))}</text>
    <text x="${meanX+4}" y="${mt+23}" font-size="9" fill="var(--amber)" font-family="monospace">±${secsToStr(Math.round(stdDev))}</text>
  </svg>`;
  document.getElementById('chart-hist').innerHTML = svg;
}

// ===== SUMMARY TAB =====
function getAutoAvg(study, act) {
  const entries = (study.entries || []).filter(e => e.activity === act && !e.deletedAt);
  if (!entries.length) return 0;
  return Math.round(entries.reduce((s, e) => s + (e.duration || 0), 0) / entries.length);
}

function renderSummary() {
  const study = currentStudy();
  if (!study) { document.getElementById('content').innerHTML = '<div class="empty-state">No study selected.</div>'; return; }
  const entries = study.entries.filter(e => !e.deletedAt);
  const mode = db.settings.hourMode;

  if (entries.length === 0) { document.getElementById('content').innerHTML = '<div class="empty-state">No entries in this study.</div>'; return; }

  const totalEntries = entries.length;
  const totalSecs = entries.reduce((s, e) => s + (e.duration || 0), 0);
  const avgSecs = Math.round(totalSecs / totalEntries);
  const longestSecs = Math.max(...entries.map(e => e.duration || 0));

  // Group by activity
  const actMap = {};
  entries.forEach(e => {
    if (!actMap[e.activity]) actMap[e.activity] = [];
    actMap[e.activity].push(e);
  });

  let html = `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Entries</div><div class="stat-value">${totalEntries}</div></div>
    <div class="stat-card"><div class="stat-label">Total Time</div><div class="stat-value">${secsToStr(totalSecs)}</div></div>
    <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value">${secsToStr(avgSecs)}</div></div>
    <div class="stat-card"><div class="stat-label">Longest</div><div class="stat-value">${secsToStr(longestSecs)}</div></div>
  </div>`;

  Object.keys(actMap).forEach(act => {
    const items = actMap[act];
    const count = items.length;
    const total = items.reduce((s, e) => s + (e.duration || 0), 0);
    const avg = Math.round(total / count);
    const longest = Math.max(...items.map(e => e.duration || 0));
    const shortest = Math.min(...items.map(e => e.duration || 0));
    const exceptions = items.filter(e => e.exception).length;
    const std     = study.manualStd[act] || 0;
    const isOpen  = expandedAccordions[act];
    const grp     = getActivityGroup(study, act);
    const aColor  = getActivityColor(study, act);
    const aNote   = (study.activityNotes && study.activityNotes[act]) || '';

    html += `
    <div class="activity-summary-row" style="${aColor ? `border-left-color:${aColor};` : ''}">
      <div class="activity-summary-header" onclick="toggleAccordion('${esc(act)}')">
        <div>
          ${grp ? `<span class="group-badge" style="background:${grp.color}22;color:${grp.color};border:1px solid ${grp.color}55;margin-bottom:3px;display:inline-flex;"><span class="group-dot" style="background:${grp.color};width:6px;height:6px;"></span>${esc(grp.name)}</span><br>` : ''}
          <div class="activity-summary-name" style="${aColor ? `color:${aColor};` : ''}">${esc(act)}</div>
          ${aNote ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;">${esc(aNote)}</div>` : ''}
          <div class="activity-summary-stats">${count}× · ${secsToStr(total)} total · avg ${secsToStr(avg)}${std ? ' · std ' + secsToStr(std) : ''}</div>
          <div class="activity-summary-stats">Longest ${secsToStr(longest)} · Shortest ${secsToStr(shortest)}${exceptions ? ' · ' + exceptions + ' exception(s)' : ''}</div>
        </div>
        <span class="chevron ${isOpen ? 'open' : ''}">▶</span>
      </div>
      <div class="activity-instances ${isOpen ? 'open' : ''}">
        <table class="instance-table">
          <thead><tr><th>#</th><th>Date</th><th>Start</th><th>End</th><th>Duration</th><th>Exc</th></tr></thead>
          <tbody>
            ${items.sort((a,b) => (b.startTs||0)-(a.startTs||0)).map((e, i) => `
            <tr>
              <td>${i+1}</td>
              <td>${e.date}</td>
              <td>${displayTime(e, 'start', mode)}</td>
              <td>${displayTime(e, 'end', mode)}</td>
              <td>${secsToStr(e.duration)}</td>
              <td>${e.exception ? '⚠' : ''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function toggleAccordion(act) {
  expandedAccordions[act] = !expandedAccordions[act];
  renderSummary();
}

// ===== NOTES FAB =====
let notesPanelDebounce = null;

function toggleNotesPanel() {
  const panel = document.getElementById('notes-panel');
  if (!panel) return;
  if (panel.classList.contains('open')) {
    _closeNotesPanel();
  } else {
    _openNotesPanel();
  }
}

function _openNotesPanel() {
  const panel = document.getElementById('notes-panel');
  const fab   = document.getElementById('notes-fab');
  if (!panel) return;
  const p  = currentProfile();
  const ta = document.getElementById('notes-panel-ta');
  if (ta && p) ta.value = p.notes || '';
  panel.classList.add('open');
  if (fab) { fab.textContent = '✕'; fab.title = 'Close notes'; fab.style.opacity = '0'; fab.style.pointerEvents = 'none'; }
  setTimeout(() => {
    const ta = document.getElementById('notes-panel-ta');
    if (ta) ta.focus();
  }, 290);
}

function _closeNotesPanel() {
  const panel = document.getElementById('notes-panel');
  const fab   = document.getElementById('notes-fab');
  if (!panel) return;
  panel.classList.remove('open');
  if (fab) { fab.textContent = '📝'; fab.title = 'Quick Notes'; fab.style.opacity = ''; fab.style.pointerEvents = ''; }
}

function _notesPanelInput() {
  clearTimeout(notesPanelDebounce);
  notesPanelDebounce = setTimeout(() => {
    const p      = currentProfile();
    const ta     = document.getElementById('notes-panel-ta');
    const footer = document.getElementById('notes-panel-saved');
    if (!p || !ta) return;
    p.notes = ta.value;
    saveDb();
    // Keep the full Notes tab textarea in sync if it's currently visible
    const fullTa = document.getElementById('notes-area');
    if (fullTa) fullTa.value = ta.value;
    if (footer) footer.textContent = 'Saved ' + nowTimeStr();
  }, 500);
}

function _updateNotesFabVisibility() {
  const fab = document.getElementById('notes-fab');

}

const ACTIVITY_COLORS = [
  '#1D4ED8','#059669','#D97706','#DC2626','#7C3AED',
  '#0891B2','#BE185D','#65A30D','#EA580C','#0F766E'
];

function getActivityColor(study, activityName) {
  if (!study || !study.activityColors) return null;
  return study.activityColors[activityName] || null;
}

function setActivityColor(activityName, color) {
  const study = currentStudy();
  if (!study) return;
  if (!study.activityColors) study.activityColors = {};
  if (color) study.activityColors[activityName] = color;
  else delete study.activityColors[activityName];
  saveDb();
  renderManage();
}

function toggleActivityColorPicker(activityName) {
  const id = `color-picker-${CSS.escape(activityName)}`;
  const existing = document.getElementById(id);
  // Close any other open pickers first
  document.querySelectorAll('.act-color-picker').forEach(el => {
    if (el.id !== id) el.remove();
  });
  if (existing) { existing.remove(); return; }
  const study = currentStudy();
  const current = getActivityColor(study, activityName);
  const dot = document.querySelector(`[data-color-trigger="${CSS.escape(activityName)}"]`);
  if (!dot) return;
  const picker = document.createElement('div');
  picker.className = 'act-color-picker';
  picker.id = id;
  // None option
  const noneBtn = document.createElement('button');
  noneBtn.className = 'act-color-swatch' + (!current ? ' selected' : '');
  noneBtn.style.cssText = 'background:var(--surface2);border-color:var(--border);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--text3);';
  noneBtn.title = 'No colour';
  noneBtn.textContent = '✕';
  noneBtn.onclick = () => setActivityColor(activityName, null);
  picker.appendChild(noneBtn);
  ACTIVITY_COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'act-color-swatch' + (current === c ? ' selected' : '');
    btn.style.background = c;
    btn.title = c;
    btn.onclick = () => setActivityColor(activityName, c);
    picker.appendChild(btn);
  });
  dot.parentNode.insertBefore(picker, dot.nextSibling);
}


const GROUP_COLORS = ['#e05555','#d4920a','#3dba6e','#5b8fe8','#a855f7','#ec4899','#14b8a6','#f97316'];

function selectGroupColor(color) {
  const hidden = document.getElementById('new-group-color');
  if (hidden) hidden.value = color;
  // Update swatch border highlights
  document.querySelectorAll('#color-swatches button').forEach(btn => {
    btn.style.border = `3px solid ${btn.style.background === color ? '#fff' : 'transparent'}`;
  });
}

function addActivityGroup() {
  const nameEl  = document.getElementById('new-group-name');
  const colorEl = document.getElementById('new-group-color');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { alert('Enter a group name.'); return; }
  const study = currentStudy();
  if (!study) return;
  if (!study.activityGroups) study.activityGroups = [];
  if (study.activityGroups.find(g => g.name === name)) { alert('A group with that name already exists.'); return; }
  study.activityGroups.push({ id: generateId(), name, color: colorEl ? colorEl.value : '#5b8fe8', activities: [] });
  saveDb();
  renderManage();
}

function deleteActivityGroup(gi) {
  const study = currentStudy();
  if (!study || !study.activityGroups) return;
  if (!confirm(`Delete group "${study.activityGroups[gi].name}"?`)) return;
  study.activityGroups.splice(gi, 1);
  saveDb();
  renderManage();
}

function addToGroup(gi) {
  const sel = document.getElementById(`group-add-sel-${gi}`);
  const act = sel ? sel.value : '';
  if (!act) return;
  const study = currentStudy();
  if (!study || !study.activityGroups) return;
  const g = study.activityGroups[gi];
  if (!g) return;
  // Remove from any other group first — each activity belongs to at most one group
  study.activityGroups.forEach((og, oi) => {
    if (oi !== gi) og.activities = og.activities.filter(a => a !== act);
  });
  if (!g.activities.includes(act)) g.activities.push(act);
  saveDb();
  renderManage();
}

function removeFromGroup(gi, act) {
  const study = currentStudy();
  if (!study || !study.activityGroups) return;
  const g = study.activityGroups[gi];
  if (!g) return;
  g.activities = g.activities.filter(a => a !== act);
  saveDb();
  renderManage();
}

// Returns the group for an activity, or null
function getActivityGroup(study, activityName) {
  if (!study || !study.activityGroups) return null;
  return study.activityGroups.find(g => g.activities.includes(activityName)) || null;
}

function secsToHMSInput(n) {
  n = Math.floor(n);
  return `${pad(Math.floor(n/3600))}:${pad(Math.floor((n%3600)/60))}:${pad(n%60)}`;
}

          <button class="act-color-swatch${actColor === c ? ' selected' : ''}"

      <button class="btn btn-ghost btn-sm" style="margin-top:6px;width:100%;" onclick="modalSaveNote(${i})">Save Note</button>
