  </div>`;

  studies.forEach(s => {
    const isActive = s.id === p.activeStudyId;
    const entryCount = s.entries.filter(e => !e.deletedAt).length;
    html += `
    <div class="study-item ${isActive ? 'active' : ''}" onclick="switchStudy('${s.id}')">
      <div class="study-item-info">
        <div class="study-item-name">${esc(s.name)} ${isActive ? '✓' : ''}</div>
        <div class="study-item-meta">${s.date} · ${entryCount} entries</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-xs" onclick="duplicateStudy('${s.id}')">⧉ Dup</button>
        <button class="btn btn-red btn-xs" onclick="deleteStudy('${s.id}')">🗑</button>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function addStudy() {
  const name = document.getElementById('new-study-name').value.trim();
  const date = document.getElementById('new-study-date').value || todayStr();
  if (!name) { alert('Enter a study name.'); return; }
  const p = currentProfile();
  if (!p) return;
  const id = generateId();
  p.studies.push({ id, name, date, activities: [], entries: [], manualStd: {} });
  p.activeStudyId = id;
  saveDb();
  renderStudies();
  updateTopBar();
}

function switchStudy(id) {
  const p = currentProfile();
  if (!p) return;
  p.activeStudyId = id;
  saveDb();
  renderStudies();
  updateTopBar();
}

function deleteStudy(id) {
  const p = currentProfile();
  if (!p) return;
  const study = p.studies.find(s => s.id === id);
  if (!study) return;
  if (!confirm(`Delete study "${study.name}"?`)) return;
  study.entries.forEach(e => {
    e.deletedAt = Date.now();
    e._studyId = id;
    e._profileId = db.activeProfileId;
    db.recyclebin.push(e);
  });
  p.studies = p.studies.filter(s => s.id !== id);
  if (p.activeStudyId === id) p.activeStudyId = p.studies[0] && p.studies[0].id;
  saveDb();
  renderStudies();
  updateTopBar();
}

function duplicateStudy(id) {
  const p = currentProfile();
  if (!p) return;
  const src = p.studies.find(s => s.id === id);
  if (!src) return;
  const newId = generateId();
  p.studies.push({
    id: newId,
    name: src.name + ' (copy)',
    date: todayStr(),
    activities: [...src.activities],
    entries: [],
    manualStd: { ...src.manualStd }
  });
  saveDb();
  renderStudies();
}

// ===== SETTINGS TAB =====
function renderSettings() {
  const mode = db.settings.hourMode;
  const theme = db.settings.theme || 'device';
  const binCount = db.recyclebin.length;
  const study = currentStudy();

  document.getElementById('content').innerHTML = `
  <div class="card">
    <div class="card-title">Display</div>
    <div class="toggle-wrap" style="margin-bottom:14px;">
      <label class="toggle">
        <input type="checkbox" ${mode === '24' ? 'checked' : ''} onchange="toggleHourMode(this.checked)">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">24-Hour Mode ${mode === '24' ? '(on)' : '(off)'}</span>
    </div>
    <div style="margin-bottom:4px;">
      <label style="display:block;margin-bottom:6px;">Appearance</label>
      <div class="theme-picker">
        <button class="theme-btn ${theme === 'light'  ? 'active' : ''}" onclick="setTheme('light')">☀ Light</button>
        <button class="theme-btn ${theme === 'device' ? 'active' : ''}" onclick="setTheme('device')">⬡ Device</button>
        <button class="theme-btn ${theme === 'dark'   ? 'active' : ''}" onclick="setTheme('dark')">☾ Dark</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Profiles</div>
    <div id="settings-profiles-list"></div>
    <div class="form-row mt8">
      <div class="form-group"><input id="new-profile-name" placeholder="New profile name" type="text"></div>
      <div style="flex-shrink:0;display:flex;align-items:flex-end;">
        <button class="btn btn-primary btn-sm" onclick="createProfile()">+ Create</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Recycle Bin</div>
    <div class="flex-between">
      <span class="text-sm text-muted">${binCount} item(s)</span>
      <button class="btn btn-ghost btn-sm" onclick="openBinModal()">View Bin</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Data</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-blue btn-full" onclick="exportCsv()">⬇ Export CSV</button>
      <button class="btn btn-blue btn-full" onclick="exportXlsx()">⬇ Export XLSX</button>
      <button class="btn btn-ghost btn-full" onclick="exportJson()">⬇ Backup (JSON)</button>
      <label class="btn btn-ghost btn-full" style="cursor:pointer;">
        ⬆ Import Backup (JSON)
        <input type="file" accept=".json" style="display:none" onchange="importJson(this)">
      </label>
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="color:var(--text3)">About</div>
    <div class="text-sm text-muted">Time Study App V2 · Single-file HTML · localStorage persistence</div>
  </div>`;

  renderSettingsProfiles();
}

function renderSettingsProfiles() {
  const el = document.getElementById('settings-profiles-list');
  if (!el) return;
  el.innerHTML = db.profiles.map(p => `
  <div class="profile-item ${p.id === db.activeProfileId ? 'active' : ''}">
    <div class="profile-item-name">${esc(p.name)}${p.id === db.activeProfileId ? ' ✓' : ''}</div>
    <div style="display:flex;gap:4px;">
      ${p.id !== db.activeProfileId ? `<button class="btn btn-ghost btn-xs" onclick="switchProfile('${p.id}')">Switch</button>` : ''}
      <button class="btn btn-ghost btn-xs" onclick="renameProfile('${p.id}')">Rename</button>
      ${db.profiles.length > 1 ? `<button class="btn btn-red btn-xs" onclick="deleteProfile('${p.id}')">Delete</button>` : ''}
    </div>
  </div>`).join('');
}

function toggleHourMode(is24) {
  db.settings.hourMode = is24 ? '24' : '12';
  saveDb();
  renderSettings();
}

function createProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) { alert('Enter profile name.'); return; }
  const studyId = generateId();
  const id = generateId();
  db.profiles.push({
    id, name,
    createdAt: new Date().toISOString(),
    studies: [{ id: studyId, name: 'Study 1', date: todayStr(), activities: [], entries: [], manualStd: {} }],
    activeStudyId: studyId,
    notes: ''
  });
  db.activeProfileId = id;
  saveDb();
  renderSettings();
  updateTopBar();
}

function switchProfile(id) {
  db.activeProfileId = id;
  saveDb();
  render();
}

function renameProfile(id) {
  const p = db.profiles.find(p => p.id === id);
  if (!p) return;
  const name = prompt('New profile name:', p.name);
  if (name && name.trim()) { p.name = name.trim(); saveDb(); renderSettings(); updateTopBar(); }
}

function deleteProfile(id) {
  const p = db.profiles.find(p => p.id === id);
  if (!p) return;
  if (!confirm(`Delete profile "${p.name}" and all its data?`)) return;
  db.profiles = db.profiles.filter(p => p.id !== id);
  db.recyclebin = db.recyclebin.filter(e => e._profileId !== id);
  if (db.activeProfileId === id) db.activeProfileId = db.profiles[0] && db.profiles[0].id;
  saveDb();
  renderSettings();
  updateTopBar();
}

// ===== PROFILE MODAL =====
function openProfileModal() {
  const el = document.getElementById('profile-modal-list');
  el.innerHTML = db.profiles.map(p => `
  <div class="profile-item ${p.id === db.activeProfileId ? 'active' : ''}" style="cursor:pointer;" onclick="switchProfileModal('${p.id}')">
    <div class="profile-item-name">${esc(p.name)}</div>
    ${p.id === db.activeProfileId ? '<span class="badge badge-green">Active</span>' : ''}
  </div>`).join('');
  openModal('profile-modal');
}

function switchProfileModal(id) {
  db.activeProfileId = id;
  saveDb();
  closeModal('profile-modal');
  render();
}

// ===== RECYCLE BIN MODAL =====
function openBinModal() {
  renderBinModal();
  openModal('bin-modal');
}

function renderBinModal() {
  const el = document.getElementById('bin-modal-list');
  if (!el) return;
  if (db.recyclebin.length === 0) {
    el.innerHTML = '<div class="empty-state">Recycle bin is empty.</div>';
    return;
  }
  el.innerHTML = `<button class="btn btn-red btn-sm btn-full mb8" onclick="binClearAll()">🗑 Permanently Delete All</button>` +
    db.recyclebin.slice().reverse().map(e => `
  <div class="bin-entry">
    <div class="bin-entry-info">
      <div class="bin-entry-name">${esc(e.activity)}</div>
      <div class="bin-entry-meta">${e.date} · ${secsToStr(e.duration)} · deleted ${new Date(e.deletedAt).toLocaleDateString()}</div>
      ${e.note ? `<div style="font-size:11px;color:var(--text3)">${esc(e.note)}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
      <button class="btn btn-green btn-xs" onclick="binRestore(${e.id})">Restore</button>
      <button class="btn btn-red btn-xs" onclick="binDelete(${e.id})">Delete</button>
    </div>
  </div>`).join('');
}

function binRestore(id) {
  const idx = db.recyclebin.findIndex(e => e.id === id);
  if (idx === -1) return;
  const entry = db.recyclebin.splice(idx, 1)[0];
  // Find the study it came from
  const profileId = entry._profileId || db.activeProfileId;
  const studyId = entry._studyId;
  const profile = db.profiles.find(p => p.id === profileId) || currentProfile();
  if (!profile) { alert('Cannot find original profile.'); return; }
  const study = profile.studies.find(s => s.id === studyId) || profile.studies[0];
  if (!study) { alert('Cannot find original study.'); return; }
  entry.deletedAt = null;
  study.entries.push(entry);
  saveDb();
  renderBinModal();
}

function binDelete(id) {
  if (!confirm('Permanently delete this entry?')) return;
  db.recyclebin = db.recyclebin.filter(e => e.id !== id);
  saveDb();
  renderBinModal();
}

function binClearAll() {
  if (!confirm('Permanently delete ALL entries in the bin?')) return;
  db.recyclebin = [];
  saveDb();
  renderBinModal();
}

// ===== EXPORT =====
function exportCsv() {
  const study = currentStudy();
  if (!study) { alert('No active study.'); return; }
  const mode = db.settings.hourMode;
  const rows = [['Date','Activity','Start','End','Duration','Secs','Exception','Note']];
  study.entries.filter(e => !e.deletedAt).forEach(e => {
    rows.push([
      e.date,
      e.activity,
      displayTime(e, 'start', mode),
      displayTime(e, 'end', mode),
      secsToStr(e.duration),
      e.duration,
      e.exception ? 'Yes' : 'No',
      e.note || ''
    ]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  downloadBlob(csv, `${study.name}_${todayStr()}.csv`, 'text/csv;charset=utf-8');
}

function exportXlsx() {
  if (window._xlsxUnavailable || typeof XLSX === 'undefined') {
    alert('XLSX export is unavailable offline until the library has been cached.\n\nPlease open the app once while connected to the internet, then try again.\n\nIn the meantime, use CSV Export — it works fully offline.');
    return;
  }
  try {
    const study = currentStudy();
    if (!study) { alert('No active study.'); return; }
    const mode = db.settings.hourMode;
    const rows = [['Date','Activity','Start','End','Duration','Secs','Exception','Note']];
    study.entries.filter(e => !e.deletedAt).forEach(e => {
      rows.push([e.date, e.activity, displayTime(e, 'start', mode), displayTime(e, 'end', mode), secsToStr(e.duration), e.duration, e.exception ? 'Yes' : 'No', e.note || '']);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Data');
    XLSX.writeFile(wb, `${study.name}_${todayStr()}.xlsx`);
  } catch(e) { alert('XLSX export failed. Try CSV instead.'); }
}

function exportJson() {
  const json = JSON.stringify(db, null, 2);
  downloadBlob(json, `TimeStudy_backup_${todayStr()}.json`, 'application/json');
}

function importJson(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.profiles || !imported.settings) throw new Error('Invalid backup');
      if (!confirm('Replace ALL current data with this backup?')) return;
      db = imported;
      saveDb();
      render();
      showNotice('Data imported successfully!');
    } catch(ex) {
      alert('Invalid backup file: ' + ex.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ===== MODAL HELPERS =====
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// ===== NOTICE =====
let noticeTimeout = null;
function showNotice(msg, type) {
  const existing = document.getElementById('_notice');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = '_notice';
  div.className = 'notice ' + (type === 'amber' ? 'notice-amber' : '');
  div.textContent = msg;
  // On mobile: notice sits below top-bar + tab-bar (both sticky).
  // On desktop: tab-bar becomes a vertical sidebar, so only top-bar height applies.
  // Use CSS variables so the offset automatically matches every breakpoint.
  const offset = isDesktop()
    ? 'calc(var(--top-h) + 12px)'
    : 'calc(var(--top-h) + var(--tab-h) + 8px)';
  div.style.cssText = `position:fixed;top:${offset};left:50%;transform:translateX(-50%);z-index:999;max-width:420px;width:90%;box-shadow:0 4px 16px rgba(0,0,0,0.18);`;
  document.body.appendChild(div);
  clearTimeout(noticeTimeout);
  noticeTimeout = setTimeout(() => div.remove(), 3000);
}

// ===== ESCAPE HELPER =====
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== RESPONSIVE HELPERS =====
function isDesktop() { return window.innerWidth >= 900; }

// Re-render on resize so layouts (e.g. stat-grid columns) update.
// On Android, opening the soft keyboard fires a resize event (viewport height
// shrinks). Guard: only re-render on genuine width changes so the keyboard
// never steals focus and dismisses itself.
let resizeDebounce = null;
let _lastInnerWidth = window.innerWidth;
window.addEventListener('resize', () => {
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(() => {
    const widthChanged = window.innerWidth !== _lastInnerWidth;
    _lastInnerWidth = window.innerWidth;
    if (!widthChanged) return;
    const focused = document.activeElement;
    const inputFocused = focused && (
      focused.tagName === 'INPUT' ||
      focused.tagName === 'TEXTAREA' ||
      focused.tagName === 'SELECT'
    );
    if (inputFocused) return;
    render();
  }, 200);
});

// ===== INIT =====
loadDb();

// Deep-link hash routing (for PWA shortcuts)
(function() {
  const hash = location.hash.replace('#', '');
  const validTabs = ['live','manual','log','summary','charts','notes','manage','studies','settings'];
  if (hash && validTabs.includes(hash)) activeTab = hash;
})();

render();
if (activeSessions.length > 0) startTimerInterval();

// ===== SERVICE WORKER =====
const _swEligible = (() => {
  const { protocol, hostname } = location;
  if (protocol === 'file:') return false;
  if (hostname === 'localhost' || hostname === '127.0.0.1') return false;
  if (hostname.endsWith('claudeusercontent.com')) return false;
  return true;
})();

if ('serviceWorker' in navigator && _swEligible) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        console.log('[PWA] Service worker registered:', reg.scope);

        // Listen for a new SW waiting to activate
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(reg);
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));

    // If a new SW just took control, reload cleanly
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; location.reload(); }
    });
  });
}

function showUpdateBanner(reg) {
  const existing = document.getElementById('_update-banner');
  if (existing) return;
  const div = document.createElement('div');
  div.id = '_update-banner';
  div.style.cssText = `
    position:fixed; bottom:0; left:0; right:0; z-index:9999;
    background:#1a1916; color:#f5f4f0;
    padding:12px 16px; display:flex; align-items:center;
    justify-content:space-between; gap:12px;
    font-family:Georgia,serif; font-size:13px;
    box-shadow:0 -2px 12px rgba(0,0,0,0.3);
  `;
  div.innerHTML = `
    <span>🔄 A new version is available.</span>
    <div style="display:flex;gap:8px">
      <button onclick="document.getElementById('_update-banner').remove()"
        style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:#f5f4f0;
               padding:5px 12px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;">
        Later
      </button>
      <button onclick="swUpdate()"
        style="background:#1a6b3a;border:none;color:#fff;
               padding:5px 12px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;">
        Update
      </button>
    </div>`;
  document.body.appendChild(div);
  window._swReg = reg;
}

function swUpdate() {
  const banner = document.getElementById('_update-banner');
  if (banner) banner.remove();
  if (window._swReg && window._swReg.waiting) {
    window._swReg.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
}

// ===== ONLINE / OFFLINE INDICATOR =====
function updateOnlineStatus() {
  const existing = document.getElementById('_offline-bar');
  if (navigator.onLine) {
    if (existing) existing.remove();
  } else {
    if (existing) return;
    const bar = document.createElement('div');
    bar.id = '_offline-bar';
    bar.style.cssText = `
      position:fixed; top:0; left:0; right:0; z-index:10000;
      background:#8a5a00; color:#fff; text-align:center;
      padding:5px 12px; font-size:12px; font-family:Georgia,serif;
    `;
    bar.textContent = '📶 You are offline — the app is fully functional, data is saved locally.';
    document.body.appendChild(bar);
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

</script>
